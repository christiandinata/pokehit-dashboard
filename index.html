            body.querySelector("#mgIeAdd").addEventListener("click",function(){
              var err=body.querySelector("#mgIeErr"); err.textContent="";
              var pid=MG.pickerVal(body,"mgIeProd"), q=MG.parseMoney(MG.v(body,"mgIeQty")), c=+MG.v(body,"mgIeCost")||0;
              if(!pid){ err.textContent="Pick a product to add."; return; }
              if(!q){ err.textContent="Quantity required for the new line."; return; }
              work.push({id:null,product_id:+pid,qty:q,cost:c,del:false,isNew:true});
              body.querySelector("#mgIeQty").value=""; body.querySelector("#mgIeCost").value="";
              paintLines();
            });
            body.querySelector("#mgIeCancel").addEventListener("click",close);
            body.querySelector("#mgIeSave").addEventListener("click",function(){
              var err=body.querySelector("#mgIeErr"); err.textContent="";
              var payload={id:id}, upd=[], add=[], del=[];
              var date=MG.v(body,"mgIeDate"); if(date && date!==MG.dstr(inv.invoice_date)) payload.invoice_date=date;
              var notes=MG.v(body,"mgIeNotes").trim(); if(notes!==(inv.notes||"")) payload.notes=notes;
              work.forEach(function(w){
                if(w.id==null){ if(!w.del && w.qty>0) add.push({product_id:w.product_id, quantity_ordered:w.qty, cost_per_unit:w.cost, cost_per_unit_idr:Math.round(w.cost*rate)}); }
                else if(w.del){ del.push(w.id); }
                else { upd.push({id:w.id, quantity_ordered:w.qty, cost_per_unit:w.cost, cost_per_unit_idr:Math.round(w.cost*rate)}); }
              });
              if(add.length) payload.add_lines=add;
              if(upd.length) payload.update_lines=upd;
              if(del.length) payload.delete_line_ids=del;
              if(payload.invoice_date===undefined && payload.notes===undefined && !add.length && !upd.length && !del.length){ close(); return; }
              var btn=body.querySelector("#mgIeSave"); btn.disabled=true; btn.textContent="Saving…";
              MG.api("invoices.update",payload).then(function(){ close(); MG.toast("Invoice #"+id+" updated","ok"); self.fetch(); MG.loadCatalog(true); })
                .catch(function(e){ btn.disabled=false; btn.textContent="Save changes"; err.textContent=e.message; });
            });
          }
        });
      }).catch(MG.fail);
    }).catch(MG.fail);
  },

  payModal:function(inv, outstanding){
    var self=this, ccy=inv.currency||"IDR";
    MG.modal({
      title:"💵 Record payment — invoice #"+inv.id,
      sub:(outstanding!=null?("Outstanding: "+num(outstanding)+" "+esc(ccy)):""),
      body:'<div class="mg-form">'
        +'<div class="mg-grid2">'
          +MG.f.num("mgPayNat","Amount ("+ccy+")",outstanding!=null?outstanding:"",1)
          +MG.f.num("mgPayIdr","Amount (IDR)"+(ccy==="IDR"?" — auto":""),"",1000)
        +'</div>'
        +MG.f.date("mgPayDate","Paid date")
        +MG.f.text("mgPayNotes","Notes","","e.g. Wise transfer ref")
        +'<div class="mg-err" id="mgPayErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgPayCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgPaySave" type="button">Record payment</button></div></div>',
      onMount:function(body, close){
        if(ccy==="IDR"){
          var nat=body.querySelector("#mgPayNat"), idr=body.querySelector("#mgPayIdr");
          idr.value=nat.value;
          nat.addEventListener("input",function(){ idr.value=nat.value; });
        }
        body.querySelector("#mgPayCancel").addEventListener("click",close);
        body.querySelector("#mgPaySave").addEventListener("click",function(){
          var err=body.querySelector("#mgPayErr"); err.textContent="";
          var amtN=MG.parseMoney(MG.v(body,"mgPayNat")), amtI=MG.parseMoney(MG.v(body,"mgPayIdr"));
          if(!amtN||!amtI){ err.textContent="Enter both native and IDR amounts."; return; }
          MG.api("payments.create",{
            invoice_id:inv.id, amount_native:amtN, amount_idr:amtI,
            paid_date:MG.v(body,"mgPayDate")||MG.today(),
            notes:MG.v(body,"mgPayNotes").trim()||undefined
          }).then(function(){
            close(); MG.toast("Payment recorded","ok"); self.fetch();
          }).catch(function(e2){ err.textContent=e2.message; });
        });
      }
    });
  },

  addModal:function(){
    var self=this;
    var supOpts=MG.partyOpts("supplier");
    if(!supOpts.length) supOpts=MG.partyOpts(null);
    MG.modal({
      title:"＋ New invoice", wide:true, sub:"Lines go ⏳ on order until a shipment picks them up.",
      body:'<div class="mg-form">'
        +'<div class="mg-grid3">'
          +MG.f.sel("mgNiSup","Supplier",supOpts,supOpts.length?supOpts[0].v:"")
          +MG.f.sel("mgNiCcy","Currency",MG.CURRENCIES,"IDR")
          +MG.f.date("mgNiDate","Invoice date")
        +'</div>'
        +'<div class="fld"><label>Lines</label><div class="mg-lines" id="mgNiLines">'
          +'<div class="lhead"><span>Product</span><span>Qty</span><span>Cost/u (ccy)</span><span>Cost/u IDR</span><span></span></div>'
        +'</div>'
        +'<button class="mg-btn sm" id="mgNiAddLine" type="button" style="align-self:flex-start;">＋ Add line</button></div>'
        +MG.f.text("mgNiNotes","Notes","","optional")
        +'<div class="mg-err" id="mgNiErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgNiCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgNiSave" type="button">Create invoice</button></div>'
      +'</div>',
      onMount:function(body, close){
        var lineN=0;
        function isIdr(){ return MG.v(body,"mgNiCcy")==="IDR"; }
        function addLine(){
          lineN++;
          var id="mgNiL"+lineN;
          var box=body.querySelector("#mgNiLines");
          var div=document.createElement("div");
          div.className="line"; div.setAttribute("data-line",id);
          div.innerHTML=MG.pickerHtml(id+"p","product…")
            +'<input class="inp" id="'+id+'q" type="number" min="1" value="1">'
            +'<input class="inp" id="'+id+'c" type="number" min="0" placeholder="native">'
            +'<input class="inp" id="'+id+'i" type="number" min="0" placeholder="IDR"'+(isIdr()?' readonly style="opacity:.6;"':'')+'>'
            +'<button class="mg-iconbtn" type="button" title="Remove">✕</button>';
          box.appendChild(div);
          MG.wirePicker(body,id+"p");
          var c=div.querySelector("#"+id+"c"), iI=div.querySelector("#"+id+"i");
          c.addEventListener("input",function(){ if(isIdr()) iI.value=c.value; });
          div.querySelector(".mg-iconbtn").addEventListener("click",function(){ box.removeChild(div); });
        }
        body.querySelector("#mgNiCcy").addEventListener("change",function(){
          var idr=isIdr();
          Array.prototype.forEach.call(body.querySelectorAll("#mgNiLines .line"),function(div){
            var id=div.getAttribute("data-line");
            var c=div.querySelector("#"+id+"c"), iI=div.querySelector("#"+id+"i");
            if(idr){ iI.value=c.value; iI.readOnly=true; iI.style.opacity=".6"; }
            else { iI.readOnly=false; iI.style.opacity=""; }
          });
        });
        addLine();
        body.querySelector("#mgNiAddLine").addEventListener("click",addLine);
        body.querySelector("#mgNiCancel").addEventListener("click",close);
        body.querySelector("#mgNiSave").addEventListener("click",function(){
          var err=body.querySelector("#mgNiErr"); err.textContent="";
          var lines=[];
          var bad=false;
          Array.prototype.forEach.call(body.querySelectorAll("#mgNiLines .line"),function(div){
            var id=div.getAttribute("data-line");
            var pid=MG.pickerVal(body,id+"p");
            var qty=MG.parseMoney(div.querySelector("#"+id+"q").value);
            var cost=parseFloat(div.querySelector("#"+id+"c").value)||0;
            var costIdr=MG.parseMoney(div.querySelector("#"+id+"i").value);
            if(!pid&&!qty&&!cost) return; // empty row, skip
            if(!pid||qty<1){ bad=true; return; }
            lines.push({ product_id:pid, quantity_ordered:qty, cost_per_unit:cost, cost_per_unit_idr:costIdr });
          });
          if(bad){ err.textContent="Every line needs a product and a quantity."; return; }
          if(!lines.length){ err.textContent="Add at least one line."; return; }
          var btn=body.querySelector("#mgNiSave"); btn.disabled=true;
          MG.api("invoices.create",{
            supplier_id:+MG.v(body,"mgNiSup"),
            currency:MG.v(body,"mgNiCcy"),
            invoice_date:MG.v(body,"mgNiDate")||MG.today(),
            notes:MG.v(body,"mgNiNotes").trim()||undefined,
            lines:lines
          }).then(function(){
            close(); MG.toast("Invoice created","ok"); self.fetch(); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; err.textContent=e2.message; });
        });
      }
    });
  }
};

/* ===================== MANAGE · SHIPMENTS ===================== */
MG.ship = {
  st:{ rows:[], q:"", built:false },

  statusChip:function(s){
    if(s==="in_warehouse") return '<span class="mg-chip" style="color:var(--green);border-color:rgba(52,211,153,.4);">🏠 arrived</span>';
    if(s==="in_transit") return '<span class="mg-chip" style="color:var(--amber);border-color:rgba(251,191,36,.4);">🚚 in transit</span>';
    return '<span class="mg-chip">⏳ '+esc(s||"ordered")+'</span>';
  },

  render:function(){
    var sec=el("sec-mg-ship"), self=this;
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Shipments — manage</div>'
       +'<div class="card"><div class="mg-toolbar">'
         +'<div class="ctl-row grow"><span class="ctl-lbl">Search</span><input class="inp" type="search" id="mgShQ" placeholder="label, id, date…"></div>'
         +'<button class="mg-btn" id="mgShReload" type="button" title="Reload">↻</button>'
         +'<button class="mg-btn primary" id="mgShAdd" type="button">＋ New shipment</button>'
       +'</div>'
       +'<div class="mg-count" id="mgShCount"></div>'
       +'<div id="mgShTable">'+MG.skel(6)+'</div></div>';
      this.st.built=true;
      el("mgShQ").addEventListener("input",function(e){ self.st.q=e.target.value; self.paint(); });
      el("mgShReload").addEventListener("click",function(){ self.fetch(); });
      el("mgShAdd").addEventListener("click",function(){ self.addModal(); });
    }
    this.fetch();
  },

  fetch:function(){
    var self=this;
    el("mgShTable").innerHTML=MG.skel(6);
    Promise.all([MG.loadCatalog(), MG.api("shipments.list",{})]).then(function(res){
      var d=res[1]||{};
      self.st.rows=arr(d.shipments||d.rows||d);
      self.paint();
    }).catch(function(err){
      el("mgShTable").innerHTML='<div class="empty">Could not load shipments — '+esc(err.message)+'</div>';
    });
  },

  paint:function(){
    var self=this, q=(this.st.q||"").toLowerCase().trim();
    var rows=this.st.rows.filter(function(r){
      if(!q) return true;
      return (("#"+r.id)+" "+(r.label||"")+" "+(r.shipment_date||"")+" "+(r.stock_status||"")).toLowerCase().indexOf(q)>=0;
    });
    el("mgShCount").textContent=num(rows.length)+" shipments";
    if(!rows.length){ el("mgShTable").innerHTML='<div class="empty">No shipments yet — book one from invoice lines with ＋ New shipment.</div>'; return; }
    var body=rows.map(function(r){
      return '<tr class="mg-click" data-id="'+r.id+'">'
        +'<td>📦 #'+r.id+'</td>'
        +'<td style="text-align:left;">'+esc(r.label||"—")+'</td>'
        +'<td>'+esc(MG.dstr(r.shipment_date))+'</td>'
        +'<td class="num">'+money(r.shipping_cost_idr)+'</td>'
        +'<td style="text-align:left;">'+self.statusChip(r.stock_status)+'</td>'
        +'<td>'+(r.stock_status==="in_transit"
          ?'<button class="mg-btn sm" data-arrive="'+r.id+'">🏠 Arrived</button>':'')+'</td>'
        +'</tr>';
    }).join("");
    el("mgShTable").innerHTML='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th>Shipment</th><th>Label</th><th>Date</th><th>Direct cost</th><th>Status</th><th></th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';
    Array.prototype.forEach.call(el("mgShTable").querySelectorAll("tr.mg-click"),function(r){
      r.addEventListener("click",function(){ self.detail(+r.getAttribute("data-id")); });
    });
    Array.prototype.forEach.call(el("mgShTable").querySelectorAll("[data-arrive]"),function(b){
      b.addEventListener("click",function(e){ e.stopPropagation(); self.arrive(+b.getAttribute("data-arrive")); });
    });
  },

  detail:function(id){
    var self=this;
    MG.modal({ title:"📦 Shipment #"+id, wide:true, body:MG.skel(5),
      onMount:function(body, close){
        MG.api("shipments.get",{id:id}).then(function(d){
          d=d||{};
          var sh=d.shipment||d, lines=arr(d.lines);
          var lineRows=lines.map(function(l){
            var pid=l.product_id!=null?l.product_id:null;
            return '<tr><td>🎴 '+esc(pid!=null?MG.prodLabelById(pid):("line "+l.invoice_line_id))+'</td>'
              +'<td>🧾 #'+esc(l.invoice_id!=null?l.invoice_id:"—")+'</td>'
              +'<td class="num">'+num(l.quantity)+'</td>'
              +'<td class="num">'+(l.landed_cost_per_unit_idr!=null?money(l.landed_cost_per_unit_idr):"—")+'</td></tr>';
          }).join("");
          body.innerHTML=
            '<div class="pmeta" style="margin-bottom:10px;">📅 '+esc(MG.dstr(sh.shipment_date))
              +(sh.label?' · 🏷️ '+esc(sh.label):'')
              +' · direct cost '+money(sh.shipping_cost_idr)
              +(sh.arrived_date?' · arrived '+esc(MG.dstr(sh.arrived_date)):'')
              +(sh.notes?'<br>📝 '+esc(sh.notes):'')+'</div>'
            +'<div style="margin-bottom:10px;">'+self.statusChip(sh.stock_status)+'</div>'
            +'<div class="tscroll"><table class="mg compact"><thead><tr><th>Product</th><th>Invoice</th><th>Qty</th><th>Landed/u</th></tr></thead><tbody>'
              +(lineRows||'<tr><td colspan="4" class="empty">No lines.</td></tr>')+'</tbody></table></div>'
            +'<div class="mg-foot">'
              +'<button class="mg-btn danger" id="mgShDel" type="button">🗑 Delete</button>'
              +'<span class="grow"></span>'
              +'<button class="mg-btn" id="mgShEdit" type="button">✏️ Edit</button>'
              +(sh.stock_status==="in_transit"?'<button class="mg-btn primary" id="mgShArr" type="button">🏠 Mark arrived</button>':'')
            +'</div>';
          var arrBtn=body.querySelector("#mgShArr");
          if(arrBtn) arrBtn.addEventListener("click",function(){ close(); self.arrive(id); });
          body.querySelector("#mgShEdit").addEventListener("click",function(){ close(); self.edit(id); });
          body.querySelector("#mgShDel").addEventListener("click",function(){
            close();
            MG.confirmBox("Delete shipment #"+id+"?","Its quantities return to ⏳ on order. Fails if FIFO sales already consumed its stock.")
              .then(function(yes){
                if(!yes) return;
                MG.api("shipments.delete",{id:id}).then(function(){ MG.toast("Shipment deleted","ok"); self.fetch(); MG.loadCatalog(true); }).catch(MG.fail);
              });
          });
        }).catch(function(err){ body.innerHTML='<div class="empty">'+esc(err.message)+'</div>'; });
      }
    });
  },

  edit:function(id){
    var self=this;
    MG.api("shipments.get",{id:id}).then(function(d){
      d=d||{};
      var sh=d.shipment||d, lines=arr(d.lines);
      // work item: {id:shipment_line_id|null, product_id, invoice_id, invoice_line_id, qty, del, isNew}
      var work=lines.map(function(l){
        return { id:l.shipment_line_id, product_id:l.product_id, invoice_id:l.invoice_id,
                 invoice_line_id:l.invoice_line_id, qty:+l.quantity||0, del:false, isNew:false };
      });
      var arrived=sh.stock_status==="in_warehouse";
      MG.loadCatalog().then(function(){
        MG.modal({ title:"✏️ Edit shipment #"+id, wide:true,
          sub:self.statusChip(sh.stock_status)+(arrived?" · editing an arrived shipment recomputes warehouse stock & landed cost":""),
          body:'<div class="mg-form">'
            +'<div class="mg-grid3">'
              +MG.f.date("mgSeDate","Shipment date",MG.dstr(sh.shipment_date))
              +MG.f.num("mgSeCost","Direct shipping cost (IDR)",+sh.shipping_cost_idr||0,1000)
              +MG.f.text("mgSeLabel","Label",sh.label||"","optional")
            +'</div>'
            +(arrived?'<div class="mg-grid2">'+MG.f.date("mgSeArr","Arrived date",MG.dstr(sh.arrived_date))+MG.f.text("mgSeNotes","Notes",sh.notes||"","optional")+'</div>'
                     :'<div class="fld">'+MG.f.text("mgSeNotes","Notes",sh.notes||"","optional")+'</div>')
            +'<div class="ctl-lbl" style="margin:10px 0 6px;">Lines — edit qty (capped at invoice open + this line), or 🗑 remove</div>'
            +'<div class="tscroll"><table class="mg compact"><thead><tr><th>Product</th><th>Invoice</th><th>Qty</th><th></th></tr></thead><tbody id="mgSeBody"></tbody></table></div>'
            +'<div class="ctl-lbl" style="margin:14px 0 6px;">Add a line from an invoice</div>'
            +MG.f.sel("mgSeInv","Invoice",[{v:"",l:"Loading…"}],"")
            +'<div id="mgSeInvLines"></div>'
            +'<div class="mg-err" id="mgSeErr"></div>'
            +'<div class="mg-foot"><button class="mg-btn" id="mgSeCancel" type="button">Cancel</button>'
            +'<button class="mg-btn primary" id="mgSeSave" type="button">Save changes</button></div>'
          +'</div>',
          onMount:function(body, close){
            function paintLines(){
              var b=body.querySelector("#mgSeBody");
              b.innerHTML=work.map(function(w,idx){
                if(w.del) return '';
                return '<tr><td style="text-align:left;">🎴 '+esc(MG.prodLabelById(w.product_id))+(w.isNew?' <span style="color:var(--green);font-size:11px;">new</span>':'')+'</td>'
                  +'<td>🧾 #'+esc(w.invoice_id!=null?w.invoice_id:"—")+'</td>'
                  +'<td><input class="inp num" data-q="'+idx+'" value="'+esc(w.qty)+'" style="width:88px;"></td>'
                  +'<td><button class="mg-iconbtn" data-del="'+idx+'" title="Remove">🗑️</button></td></tr>';
              }).join("")||'<tr><td colspan="4" class="empty">No lines — add one below.</td></tr>';
              Array.prototype.forEach.call(b.querySelectorAll("[data-q]"),function(inp){ inp.addEventListener("input",function(){ work[+inp.getAttribute("data-q")].qty=MG.parseMoney(inp.value); }); });
              Array.prototype.forEach.call(b.querySelectorAll("[data-del]"),function(btn){ btn.addEventListener("click",function(){ work[+btn.getAttribute("data-del")].del=true; paintLines(); }); });
            }
            paintLines();
            // add-line: pick invoice -> show its open lines (+ qty already shipped on THIS shipment counts as available again)
            function loadInvoiceLines(invId){
              var box=body.querySelector("#mgSeInvLines");
              if(!invId){ box.innerHTML=""; return; }
              box.innerHTML=MG.skel(2);
              MG.api("invoices.get",{id:+invId}).then(function(dd){
                dd=dd||{};
                var ils=arr(dd.lines), ful={}; arr(dd.line_fulfillment).forEach(function(f){ ful[f.invoice_line_id]=f; });
                var open=ils.map(function(l){
                  var f=ful[l.id]||{};
                  var rem=(f.quantity_remaining!=null)?f.quantity_remaining:((l.quantity_remaining!=null)?l.quantity_remaining:l.quantity_ordered);
                  return { line:l, rem:+rem||0 };
                }).filter(function(x){ return x.rem>0; });
                if(!open.length){ box.innerHTML='<div class="empty">No open quantity left on this invoice.</div>'; return; }
                box.innerHTML='<div class="mg-stage">'+open.map(function(x,i){
                  return '<div class="sline"><span>🎴 '+esc(MG.prodLabelById(x.line.product_id))+' <span style="color:var(--muted);">⏳ '+num(x.rem)+' open</span></span>'
                    +'<span><input class="inp" style="width:74px;min-height:32px;padding:5px 8px;" type="number" min="1" max="'+x.rem+'" value="'+x.rem+'" id="mgSeOq'+i+'">'
                    +' <button class="mg-btn sm" data-stg="'+i+'" type="button">Add</button></span></div>';
                }).join("")+'</div>';
                Array.prototype.forEach.call(box.querySelectorAll("[data-stg]"),function(btn){
                  btn.addEventListener("click",function(){
                    var i=+btn.getAttribute("data-stg"), x=open[i];
                    var q=MG.parseMoney(body.querySelector("#mgSeOq"+i).value);
                    if(q<1||q>x.rem){ MG.toast("Quantity must be 1–"+x.rem,"err"); return; }
                    // merge into an existing (non-deleted) line for the same invoice line, else add new
                    var found=null;
                    work.forEach(function(w){ if(!w.del && w.invoice_line_id===x.line.id) found=w; });
                    if(found) found.qty=(+found.qty||0)+q;
                    else work.push({ id:null, product_id:x.line.product_id, invoice_id:x.line.invoice_id||+invId, invoice_line_id:x.line.id, qty:q, del:false, isNew:true });
                    paintLines();
                    MG.toast("Added "+q+" × "+MG.prodLabelById(x.line.product_id),"ok");
                  });
                });
              }).catch(function(e){ box.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; });
            }
            MG.api("invoices.list",{}).then(function(dd){
              var invs=arr((dd||{}).invoices||dd);
              var sel=body.querySelector("#mgSeInv");
              sel.innerHTML='<option value="">— pick an invoice —</option>'+invs.map(function(r){
                return '<option value="'+r.id+'">#'+r.id+' · '+esc(r.supplier_name||MG.partyName(r.supplier_id))+' · '+esc(MG.dstr(r.invoice_date))+'</option>';
              }).join("");
              sel.addEventListener("change",function(e){ loadInvoiceLines(e.target.value); });
            }).catch(function(e){ body.querySelector("#mgSeErr").textContent=e.message; });

            body.querySelector("#mgSeCancel").addEventListener("click",close);
            body.querySelector("#mgSeSave").addEventListener("click",function(){
              var err=body.querySelector("#mgSeErr"); err.textContent="";
              var payload={id:id}, upd=[], add=[], del=[];
              var date=MG.v(body,"mgSeDate"); if(date && date!==MG.dstr(sh.shipment_date)) payload.shipment_date=date;
              var label=MG.v(body,"mgSeLabel").trim(); if(label!==(sh.label||"")) payload.label=label;
              var notes=MG.v(body,"mgSeNotes").trim(); if(notes!==(sh.notes||"")) payload.notes=notes;
              var cost=MG.parseMoney(MG.v(body,"mgSeCost")); if(cost!==(+sh.shipping_cost_idr||0)) payload.shipping_cost_idr=cost;
              if(arrived){ var ad=MG.v(body,"mgSeArr"); if(ad && ad!==MG.dstr(sh.arrived_date)) payload.arrived_date=ad; }
              work.forEach(function(w){
                if(w.id==null){ if(!w.del && w.qty>0) add.push({invoice_line_id:w.invoice_line_id, quantity:w.qty}); }
                else if(w.del){ del.push(w.id); }
                else { upd.push({id:w.id, quantity:w.qty}); }
              });
              if(add.length) payload.add_lines=add;
              if(upd.length) payload.update_lines=upd;
              if(del.length) payload.delete_line_ids=del;
              var hdr=(payload.shipment_date!==undefined||payload.label!==undefined||payload.notes!==undefined||payload.shipping_cost_idr!==undefined||payload.arrived_date!==undefined);
              if(!hdr && !add.length && !upd.length && !del.length){ close(); return; }
              var btn=body.querySelector("#mgSeSave"); btn.disabled=true; btn.textContent="Saving…";
              MG.api("shipments.update",payload).then(function(){ close(); MG.toast("Shipment #"+id+" updated","ok"); self.fetch(); MG.loadCatalog(true); })
                .catch(function(e){ btn.disabled=false; btn.textContent="Save changes"; err.textContent=e.message; });
            });
          }
        });
      }).catch(MG.fail);
    }).catch(MG.fail);
  },

  arrive:function(id){
    var self=this;
    MG.modal({
      title:"🏠 Mark shipment #"+id+" arrived",
      body:'<div class="mg-form">'+MG.f.date("mgShArrDate","Arrived date")
        +'<div class="mg-err" id="mgShArrErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgShArrCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgShArrOk" type="button">Confirm arrival</button></div></div>',
      onMount:function(body, close){
        body.querySelector("#mgShArrCancel").addEventListener("click",close);
        body.querySelector("#mgShArrOk").addEventListener("click",function(){
          MG.api("shipments.arrive",{ id:id, arrived_date:MG.v(body,"mgShArrDate")||MG.today() }).then(function(){
            close(); MG.toast("Shipment arrived — stock is now 🏠 warehouse","ok");
            self.fetch(); MG.loadCatalog(true);
          }).catch(function(e2){ body.querySelector("#mgShArrErr").textContent=e2.message; });
        });
      }
    });
  },

  addModal:function(){
    var self=this;
    MG.modal({
      title:"＋ New shipment", wide:true,
      sub:"Pick open invoice lines (⏳ on order) and how many units this box carries.",
      body:'<div class="mg-form">'
        +'<div class="mg-grid3">'
          +MG.f.date("mgNshDate","Shipment date")
          +MG.f.num("mgNshCost","Direct shipping cost (IDR)",0,1000)
          +MG.f.text("mgNshLabel","Label","","e.g. Box A via EMS")
        +'</div>'
        +MG.f.sel("mgNshInv","Add lines from invoice",[{v:"",l:"Loading…"}],"")
        +'<div id="mgNshInvLines"></div>'
        +'<div class="fld"><label>Staged lines</label><div class="mg-stage" id="mgNshStage"><div class="empty" style="padding:8px;">Nothing staged yet.</div></div></div>'
        +MG.f.text("mgNshNotes","Notes","","optional")
        +'<div class="mg-err" id="mgNshErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgNshCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgNshSave" type="button">Create shipment</button></div>'
      +'</div>',
      onMount:function(body, close){
        var staged=[]; // {invoice_line_id, product_id, quantity, max, invoice_id}
        function paintStage(){
          var box=body.querySelector("#mgNshStage");
          if(!staged.length){ box.innerHTML='<div class="empty" style="padding:8px;">Nothing staged yet.</div>'; return; }
          box.innerHTML=staged.map(function(s,i){
            return '<div class="sline"><span>🎴 '+esc(MG.prodLabelById(s.product_id))+' <span style="color:var(--muted);">(🧾 #'+s.invoice_id+')</span></span>'
              +'<span class="num">'+num(s.quantity)+' pcs <button class="mg-iconbtn" data-un="'+i+'" title="Remove">✕</button></span></div>';
          }).join("");
          Array.prototype.forEach.call(box.querySelectorAll("[data-un]"),function(b){
            b.addEventListener("click",function(){ staged.splice(+b.getAttribute("data-un"),1); paintStage(); });
          });
        }
        function loadInvoiceLines(invId){
          var box=body.querySelector("#mgNshInvLines");
          if(!invId){ box.innerHTML=""; return; }
          box.innerHTML=MG.skel(3);
          MG.api("invoices.get",{id:+invId}).then(function(d){
            d=d||{};
            var lines=arr(d.lines);
            var ful={}; arr(d.line_fulfillment).forEach(function(f){ ful[f.invoice_line_id]=f; });
            var open=lines.map(function(l){
              var f=ful[l.id]||{};
              var rem=(f.quantity_remaining!=null)?f.quantity_remaining
                :((l.quantity_remaining!=null)?l.quantity_remaining:l.quantity_ordered);
              return { line:l, rem:+rem||0 };
            }).filter(function(x){ return x.rem>0; });
            if(!open.length){ box.innerHTML='<div class="empty">No open quantity left on this invoice.</div>'; return; }
            box.innerHTML='<div class="mg-stage">'+open.map(function(x,i){
              return '<div class="sline"><span>🎴 '+esc(MG.prodLabelById(x.line.product_id))+' <span style="color:var(--muted);">⏳ '+num(x.rem)+' open</span></span>'
                +'<span><input class="inp" style="width:74px;min-height:32px;padding:5px 8px;" type="number" min="0" max="'+x.rem+'" value="'+x.rem+'" id="mgNshOq'+i+'">'
                +' <button class="mg-btn sm" data-stg="'+i+'" type="button">Add</button></span></div>';
            }).join("")+'</div>';
            Array.prototype.forEach.call(box.querySelectorAll("[data-stg]"),function(b){
              b.addEventListener("click",function(){
                var i=+b.getAttribute("data-stg"), x=open[i];
                var q=MG.parseMoney(body.querySelector("#mgNshOq"+i).value);
                if(q<1||q>x.rem){ MG.toast("Quantity must be 1–"+x.rem,"err"); return; }
                // merge if already staged
                var found=null;
                staged.forEach(function(s){ if(s.invoice_line_id===x.line.id) found=s; });
                if(found) found.quantity=Math.min(x.rem, found.quantity+q);
                else staged.push({ invoice_line_id:x.line.id, product_id:x.line.product_id, quantity:q, max:x.rem, invoice_id:x.line.invoice_id||+invId });
                paintStage();
                MG.toast("Staged "+q+" × "+MG.prodLabelById(x.line.product_id),"ok");
              });
            });
          }).catch(function(err){ box.innerHTML='<div class="empty">'+esc(err.message)+'</div>'; });
        }
        // fill invoice dropdown
        MG.api("invoices.list",{}).then(function(d){
          var invs=arr((d||{}).invoices||d);
          var open=invs.filter(function(r){ return r.shipping_status!=="fully_shipped" && r.shipping_status!=="closed_with_shortage"; });
          var list=open.length?open:invs;
          var sel=body.querySelector("#mgNshInv");
          sel.innerHTML='<option value="">— pick an invoice —</option>'+list.map(function(r){
            var sup=r.supplier_name||MG.partyName(r.supplier_id);
            return '<option value="'+r.id+'">#'+r.id+' · '+esc(sup)+' · '+esc(MG.dstr(r.invoice_date))+'</option>';
          }).join("");
          sel.addEventListener("change",function(e){ loadInvoiceLines(e.target.value); });
        }).catch(function(err){ body.querySelector("#mgNshErr").textContent=err.message; });

        body.querySelector("#mgNshCancel").addEventListener("click",close);
        body.querySelector("#mgNshSave").addEventListener("click",function(){
          var err=body.querySelector("#mgNshErr"); err.textContent="";
          if(!staged.length){ err.textContent="Stage at least one invoice line."; return; }
          var btn=body.querySelector("#mgNshSave"); btn.disabled=true;
          MG.api("shipments.create",{
            shipment_date:MG.v(body,"mgNshDate")||MG.today(),
            shipping_cost_idr:MG.parseMoney(MG.v(body,"mgNshCost")),
            label:MG.v(body,"mgNshLabel").trim()||undefined,
            notes:MG.v(body,"mgNshNotes").trim()||undefined,
            lines:staged.map(function(s){ return { invoice_line_id:s.invoice_line_id, quantity:s.quantity }; })
          }).then(function(){
            close(); MG.toast("Shipment created — stock is 🚚 in transit","ok");
            self.fetch(); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; err.textContent=e2.message; });
        });
      }
    });
  }
};

/* ===================== MANAGE · LEGS ===================== */
MG.legs = {
  st:{ rows:[], built:false },

  render:function(){
    var sec=el("sec-mg-legs"), self=this;
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Shipping legs — shared costs</div>'
       +'<div class="note">A 🚛 leg is one shared cost (lalamove, customs, Wise fee) split across shipments by weight. '
       +'Optionally filter to a 👤 party or specific lines so only their stock pays.</div>'
       +'<div class="card"><div class="mg-toolbar">'
         +'<span class="spacer"></span>'
         +'<button class="mg-btn" id="mgLgReload" type="button" title="Reload">↻</button>'
         +'<button class="mg-btn primary" id="mgLgAdd" type="button">＋ Add leg</button>'
       +'</div>'
       +'<div id="mgLgTable">'+MG.skel(5)+'</div></div>';
      this.st.built=true;
      el("mgLgReload").addEventListener("click",function(){ self.fetch(); });
      el("mgLgAdd").addEventListener("click",function(){ self.addModal(); });
    }
    this.fetch();
  },

  fetch:function(){
    var self=this;
    el("mgLgTable").innerHTML=MG.skel(5);
    Promise.all([MG.loadCatalog(), MG.api("legs.list",{})]).then(function(res){
      var d=res[1]||{};
      self.st.rows=arr(d.legs||d.rows||d);
      self.paint();
    }).catch(function(err){
      el("mgLgTable").innerHTML='<div class="empty">Could not load legs — '+esc(err.message)+'</div>';
    });
  },

  paint:function(){
    var self=this, rows=this.st.rows;
    if(!rows.length){ el("mgLgTable").innerHTML='<div class="empty">No shipping legs yet.</div>'; return; }
    var body=rows.map(function(r){
      var allocs=arr(r.allocations);
      var ships = allocs.length ? allocs.map(function(a){return "#"+a.shipment_id;}).join(", ") : "—";
      var lineNote = arr(r.line_selections).length ? ' <span style="color:var(--muted);font-size:11px;">(specific lines)</span>' : '';
      return '<tr><td>🚛 '+esc(r.label||("#"+r.id))+'</td>'
        +'<td>'+esc(MG.dstr(r.incurred_date||r.leg_date||r.date))+'</td>'
        +'<td class="num">'+money(r.amount_idr)+'</td>'
        +'<td style="text-align:left;">'+(r.party_id?("👤 "+esc(MG.partyName(r.party_id))):'<span style="color:var(--muted);">all</span>')+'</td>'
        +'<td style="text-align:left;max-width:220px;overflow:hidden;text-overflow:ellipsis;" title="'+esc(ships)+'">'+esc(ships)+lineNote+'</td>'
        +'<td><button class="mg-iconbtn" data-del="'+r.id+'" title="Delete">🗑️</button></td></tr>';
    }).join("");
    el("mgLgTable").innerHTML='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th>Leg</th><th>Date</th><th>Amount</th><th>Party filter</th><th>Shipments</th><th></th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';
    Array.prototype.forEach.call(el("mgLgTable").querySelectorAll("[data-del]"),function(b){
      b.addEventListener("click",function(){
        var id=+b.getAttribute("data-del");
        MG.confirmBox("Delete leg #"+id+"?","Landed costs of the shipments it touched are recomputed without it.")
          .then(function(yes){
            if(!yes) return;
            MG.api("legs.delete",{id:id}).then(function(){ MG.toast("Leg deleted","ok"); self.fetch(); MG.loadCatalog(true); }).catch(MG.fail);
          });
      });
    });
  },

  addModal:function(){
    var self=this;
    var partyOpts=[{v:"",l:"— no filter (charge everyone) —"}].concat(MG.partyOpts(null));
    MG.modal({
      title:"＋ Add shipping leg", wide:true,
      sub:"Cost is split weight-proportionally across the selected shipments\u2019 lines.",
      body:'<div class="mg-form">'
        +'<div class="mg-grid3">'
          +MG.f.text("mgNlLabel","Label","","e.g. Lalamove batch 3")
          +MG.f.num("mgNlAmt","Amount (IDR)","",1000)
          +MG.f.date("mgNlDate","Incurred date")
        +'</div>'
        +MG.f.sel("mgNlParty","Party filter (optional)",partyOpts,"")
        +'<div class="fld"><label>Shipments</label><div id="mgNlShips">'+MG.skel(3)+'</div></div>'
        +'<div class="fld"><label><input type="checkbox" class="mg-cb" id="mgNlLineSel" style="margin-right:7px;">Limit to specific lines</label>'
        +'<div id="mgNlLines" style="display:none;"></div></div>'
        +'<div class="mg-err" id="mgNlErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgNlCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgNlSave" type="button">Add leg</button></div>'
      +'</div>',
      onMount:function(body, close){
        var shipRows=[];
        MG.api("shipments.list",{}).then(function(d){
          shipRows=arr((d||{}).shipments||d);
          var box=body.querySelector("#mgNlShips");
          if(!shipRows.length){ box.innerHTML='<div class="empty">No shipments to attach.</div>'; return; }
          box.innerHTML='<div class="mg-stage">'+shipRows.map(function(r){
            return '<div class="sline"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">'
              +'<input type="checkbox" class="mg-cb" data-ship="'+r.id+'">'
              +'📦 #'+r.id+' '+esc(r.label||"")+' · '+esc(MG.dstr(r.shipment_date))+'</label>'
              +'<span style="color:var(--muted);">'+esc(r.stock_status||"")+'</span></div>';
          }).join("")+'</div>';
          Array.prototype.forEach.call(box.querySelectorAll("[data-ship]"),function(c){
            c.addEventListener("change",refreshLines);
          });
        }).catch(function(err){ body.querySelector("#mgNlShips").innerHTML='<div class="empty">'+esc(err.message)+'</div>'; });

        function selectedShipIds(){
          var out=[];
          Array.prototype.forEach.call(body.querySelectorAll("[data-ship]:checked"),function(c){ out.push(+c.getAttribute("data-ship")); });
          return out;
        }
        function refreshLines(){
          if(!body.querySelector("#mgNlLineSel").checked) return;
          var box=body.querySelector("#mgNlLines");
          var ids=selectedShipIds();
          if(!ids.length){ box.innerHTML='<div class="empty" style="padding:8px;">Select shipments first.</div>'; return; }
          box.innerHTML=MG.skel(2);
          Promise.all(ids.map(function(id){ return MG.api("shipments.get",{id:id}); })).then(function(all){
            var html="";
            all.forEach(function(d,k){
              var lines=arr((d||{}).lines);
              html+='<div class="mg-stage" style="margin-bottom:6px;"><div style="font-weight:700;font-size:12px;margin-bottom:4px;">📦 #'+ids[k]+'</div>'
                +lines.map(function(l){
                  var pid=l.product_id;
                  return '<div class="sline"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">'
                    +'<input type="checkbox" class="mg-cb" data-line="'+(l.id!=null?l.id:l.shipment_line_id)+'" checked>'
                    +'🎴 '+esc(pid!=null?MG.prodLabelById(pid):("line "+l.invoice_line_id))+' × '+num(l.quantity)+'</label></div>';
                }).join("")+'</div>';
            });
            box.innerHTML=html||'<div class="empty">No lines found.</div>';
          }).catch(function(err){ box.innerHTML='<div class="empty">'+esc(err.message)+'</div>'; });
        }
        body.querySelector("#mgNlLineSel").addEventListener("change",function(e){
          body.querySelector("#mgNlLines").style.display=e.target.checked?"block":"none";
          if(e.target.checked) refreshLines();
        });
        body.querySelector("#mgNlCancel").addEventListener("click",close);
        body.querySelector("#mgNlSave").addEventListener("click",function(){
          var err=body.querySelector("#mgNlErr"); err.textContent="";
          var label=MG.v(body,"mgNlLabel").trim(), amt=MG.parseMoney(MG.v(body,"mgNlAmt"));
          var ids=selectedShipIds();
          if(!label){ err.textContent="Give the leg a label."; return; }
          if(!amt){ err.textContent="Enter the amount."; return; }
          if(!ids.length){ err.textContent="Select at least one shipment."; return; }
          var payload={
            label:label, amount_idr:amt,
            incurred_date:MG.v(body,"mgNlDate")||MG.today(),
            shipment_ids:ids
          };
          var party=MG.v(body,"mgNlParty"); if(party) payload.party_id=+party;
          if(body.querySelector("#mgNlLineSel").checked){
            var lineIds=[];
            Array.prototype.forEach.call(body.querySelectorAll("[data-line]:checked"),function(c){ lineIds.push(+c.getAttribute("data-line")); });
            if(lineIds.length) payload.line_selections=lineIds;
          }
          var btn=body.querySelector("#mgNlSave"); btn.disabled=true;
          MG.api("legs.create",payload).then(function(){
            close(); MG.toast("Leg added — landed costs updated","ok");
            self.fetch(); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; err.textContent=e2.message; });
        });
      }
    });
  }
};

/* ===================== MANAGE · EXPENSES ===================== */
MG.expenses = {
  st:{ rows:[], q:"", date_from:"", date_to:"", category_id:"", built:false },

  render:function(){
    var sec=el("sec-mg-expenses"), self=this;
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Expenses — manage</div>'
       +'<div class="note">💸 Operating costs (rent, salary, fees) live here — separate from invoice/stock costs. Net profit = revenue − COGS − these.</div>'
       +'<div class="card"><div class="mg-toolbar">'
         +'<div class="ctl-row"><span class="ctl-lbl">From</span><input class="inp" type="date" id="mgExFrom"></div>'
         +'<div class="ctl-row"><span class="ctl-lbl">To</span><input class="inp" type="date" id="mgExTo"></div>'
         +'<div class="ctl-row"><span class="ctl-lbl">Category</span><select class="dd" id="mgExCat"><option value="">All</option></select></div>'
         +'<div class="ctl-row grow"><span class="ctl-lbl">Search</span><input class="inp" type="search" id="mgExQ" placeholder="category, party, description…"></div>'
         +'<button class="mg-btn" id="mgExReload" type="button" title="Reload">↻</button>'
         +'<button class="mg-btn primary" id="mgExAdd" type="button">＋ Add expense</button>'
       +'</div>'
       +'<div class="mg-count" id="mgExCount"></div>'
       +'<div id="mgExTable">'+MG.skel(6)+'</div></div>';
      this.st.built=true;
      el("mgExFrom").addEventListener("change",function(e){ self.st.date_from=e.target.value; self.fetch(); });
      el("mgExTo").addEventListener("change",function(e){ self.st.date_to=e.target.value; self.fetch(); });
      el("mgExCat").addEventListener("change",function(e){ self.st.category_id=e.target.value; self.fetch(); });
      el("mgExQ").addEventListener("input",function(e){ self.st.q=e.target.value; self.paint(); });
      el("mgExReload").addEventListener("click",function(){ self.fetch(); });
      el("mgExAdd").addEventListener("click",function(){ self.editModal(null); });
      MG.loadCatalog().then(function(){
        el("mgExCat").innerHTML='<option value="">All categories</option>'+MG.cat.categories.map(function(c){
          return '<option value="'+c.id+'">'+esc(c.name)+'</option>';
        }).join("");
      });
    }
    this.fetch();
  },

  fetch:function(){
    var self=this, st=this.st;
    el("mgExTable").innerHTML=MG.skel(6);
    var body={ limit:300 };
    if(st.date_from) body.date_from=st.date_from;
    if(st.date_to) body.date_to=st.date_to;
    if(st.category_id) body.category_id=+st.category_id;
    Promise.all([MG.loadCatalog(), MG.api("expenses.list", body)]).then(function(res){
      st.rows=arr((res[1]||{}).expenses);
      self.paint();
    }).catch(function(err){
      el("mgExTable").innerHTML='<div class="empty">Could not load expenses — '+esc(err.message)+'</div>';
    });
  },

  filtered:function(){
    var q=(this.st.q||"").toLowerCase().trim();
    if(!q) return this.st.rows;
    return this.st.rows.filter(function(x){
      var hay=((x.category_name||"")+" "+(x.from_name||"")+" "+(x.to_name||"")+" "
        +(x.description||"")+" "+(x.notes||"")+" "+(x.date||"")).toLowerCase();
      return hay.indexOf(q)>=0;
    });
  },

  paint:function(){
    var self=this, rows=this.filtered();
    var total=0; rows.forEach(function(x){ total+=(+x.amount_idr||0); });
    el("mgExCount").textContent=num(rows.length)+" of "+num(this.st.rows.length)+" expenses · total "+money(total);
    if(!rows.length){
      el("mgExTable").innerHTML='<div class="empty">No expenses match — record one with ＋ Add expense.</div>';
      return;
    }
    var body=rows.map(function(x){
      return '<tr class="mg-click" data-id="'+x.id+'">'
        +'<td>'+esc(MG.dstr(x.date))+'</td>'
        +'<td style="text-align:left;">🏷️ '+esc(x.category_name||MG.catName(x.category_id))+'</td>'
        +'<td style="text-align:left;">'+esc(x.from_name||MG.partyName(x.from_party_id))+'</td>'
        +'<td style="text-align:left;">'+esc(x.to_name||MG.partyName(x.to_party_id))+'</td>'
        +'<td class="num">'+money(x.amount_idr)+'</td>'
        +'<td style="text-align:left;max-width:260px;overflow:hidden;text-overflow:ellipsis;">'+esc(x.description||"—")+'</td>'
        +'<td><span class="mg-rowact">'
          +'<button class="mg-iconbtn" data-edit="'+x.id+'" title="Edit">✏️</button>'
          +'<button class="mg-iconbtn" data-del="'+x.id+'" title="Delete">🗑️</button>'
        +'</span></td></tr>';
    }).join("");
    el("mgExTable").innerHTML='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th>Date</th><th>Category</th><th>From</th><th>To</th><th>Amount</th><th>Description</th><th></th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';
    var t=el("mgExTable");
    function rowOf(id){
      for(var i=0;i<self.st.rows.length;i++) if(self.st.rows[i].id===id) return self.st.rows[i];
      return null;
    }
    Array.prototype.forEach.call(t.querySelectorAll("[data-edit]"),function(b){
      b.addEventListener("click",function(e){ e.stopPropagation(); self.editModal(rowOf(+b.getAttribute("data-edit"))); });
    });
    Array.prototype.forEach.call(t.querySelectorAll("[data-del]"),function(b){
      b.addEventListener("click",function(e){ e.stopPropagation(); self.del(+b.getAttribute("data-del")); });
    });
    Array.prototype.forEach.call(t.querySelectorAll("tr.mg-click"),function(r){
      r.addEventListener("click",function(){ self.editModal(rowOf(+r.getAttribute("data-id"))); });
    });
  },

  editModal:function(x){
    var self=this, isNew=!x;
    var catOpts=[{v:"",l:"— pick category —"}].concat(MG.cat.categories.map(function(c){ return {v:c.id,l:c.name}; }));
    var partyOpts=[{v:"",l:"— pick party —"}].concat(MG.partyOpts(null));
    var defaultFrom="";
    if(isNew){
      for(var i=0;i<MG.cat.parties.length;i++) if(MG.cat.parties[i].kind==="team"){ defaultFrom=MG.cat.parties[i].id; break; }
    }
    MG.modal({
      title:isNew?"＋ Add expense":"✏️ Expense #"+x.id,

MG.transfers = {
  st:{ rows:[], built:false },

  render:function(){
    var sec=el("sec-mg-transfers"), self=this;
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Transfers — warehouse ↔ store</div>'
       +'<div class="note">🔁 Moves stock between 🏠 warehouse and 🏬 store. Cost basis travels with the units — FIFO order is untouched.</div>'
       +'<div class="card"><div class="mg-toolbar">'
         +'<span class="spacer"></span>'
         +'<button class="mg-btn" id="mgTrReload" type="button" title="Reload">↻</button>'
         +'<button class="mg-btn primary" id="mgTrAdd" type="button">＋ New transfer</button>'
       +'</div>'
       +'<div id="mgTrTable">'+MG.skel(5)+'</div></div>';
      this.st.built=true;
      el("mgTrReload").addEventListener("click",function(){ self.fetch(); });
      el("mgTrAdd").addEventListener("click",function(){ self.addModal(); });
    }
    this.fetch();
  },

  fetch:function(){
    var self=this;
    el("mgTrTable").innerHTML=MG.skel(5);
    Promise.all([MG.loadCatalog(), MG.api("transfers.list",{limit:200})]).then(function(res){
      self.st.rows=arr((res[1]||{}).transfers);

    }).catch(function(err){
      el("mgTrTable").innerHTML='<div class="empty">Could not load transfers — '+esc(err.message)+'</div>';
    });
  },

  paint:function(){
    var rows=this.st.rows;
    if(!rows.length){ el("mgTrTable").innerHTML='<div class="empty">No transfers yet — move stock with ＋ New transfer.</div>'; return; }
    var body=rows.map(function(r){
      var dir = r.direction==="to_store" ? '🏠 → 🏬 store' : '🏬 → 🏠 warehouse';
      return '<tr>'
        +'<td>'+esc(MG.dstr(r.transfer_date))+'</td>'
        +'<td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;">🎴 '+esc(MG.prodLabelById(r.product_id))+'</td>'
        +'<td style="text-align:left;">'+dir+'</td>'
        +'<td class="num">'+num(r.quantity)+'</td>'
        +'<td style="text-align:left;max-width:220px;overflow:hidden;text-overflow:ellipsis;">'+esc(r.notes||"—")+'</td>'
      +'</tr>';
    }).join("");
    el("mgTrTable").innerHTML='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th>Date</th><th>Product</th><th>Direction</th><th>Qty</th><th>Notes</th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';
  },

  addModal:function(){
    var self=this;
    var dirs=[
      { id:"to_store",     label:"Warehouse → Store", icon:"🏬" },
      { id:"to_warehouse", label:"Store → Warehouse", icon:"🏠" }
    ];
    MG.modal({
      title:"＋ New transfer", sub:"Move stock between the warehouse and the storefront.",
      body:'<div class="mg-form">'
        +'<div class="fld"><label>Product</label>'+MG.pickerHtml("mgNtProd")+'</div>'
        +MG.f.picks("mgNtDir","Direction",dirs,"to_store")
        +'<div class="mg-grid2">'
          +MG.f.num("mgNtQty","Quantity",1)
          +MG.f.date("mgNtDate","Transfer date")
        +'</div>'
        +'<div id="mgNtPrev" style="display:none;"></div>'
        +MG.f.text("mgNtNotes","Notes","","optional")
        +'<div class="mg-err" id="mgNtErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgNtCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgNtSave" type="button">Move stock</button></div>'
      +'</div>',
      onMount:function(body, close){
        function qty(){ return Math.max(0, MG.parseMoney(MG.v(body,"mgNtQty"))); }
        function preview(){
          var pid=MG.pickerVal(body,"mgNtProd"), q=qty(), dir=MG.pickVal(body,"mgNtDir");
          var box=body.querySelector("#mgNtPrev");
          if(!pid){ box.style.display="none"; return; }
          var st=MG.stockOf(pid);
          var toStore = dir==="to_store";
          var src = toStore ? (st.in_warehouse||0) : (st.in_store||0);
          var dst = toStore ? (st.in_store||0) : (st.in_warehouse||0);
          var srcIcon = toStore ? "🏠" : "🏬", dstIcon = toStore ? "🏬" : "🏠";
          var srcLbl = toStore ? "Warehouse" : "Store", dstLbl = toStore ? "Store" : "Warehouse";
          var bad = q>src;
          box.style.display="block";
          box.innerHTML='<div class="mg-xfer-prev"'+(bad?' style="border-color:var(--red);"':'')+'>'
            +'<div class="mg-xfer-cell"><div class="b">'+srcIcon+' '+num(src)+'</div>'
              +'<div class="a">'+srcLbl+' → <span class="delta '+(bad?'neg':'')+'">'+num(src-q)+'</span></div></div>'
            +'<div class="arrow">➜ '+num(q)+' ➜</div>'
            +'<div class="mg-xfer-cell"><div class="b">'+dstIcon+' '+num(dst)+'</div>'
              +'<div class="a">'+dstLbl+' → <span class="delta pos">'+num(dst+q)+'</span></div></div>'
          +'</div>'
          +(bad?'<div class="mg-err" style="margin-top:6px;">Only '+num(src)+' available in '+srcLbl.toLowerCase()+'.</div>':'');
        }
        MG.wirePicker(body,"mgNtProd",preview);
        MG.wirePicks(body,"mgNtDir",preview);
        body.querySelector("#mgNtQty").addEventListener("input",preview);
        body.querySelector("#mgNtCancel").addEventListener("click",close);
        body.querySelector("#mgNtSave").addEventListener("click",function(){
          var err=body.querySelector("#mgNtErr"); err.textContent="";
          var pid=MG.pickerVal(body,"mgNtProd");
          if(!pid){ err.textContent="Pick a product."; return; }
          if(!qty()){ err.textContent="Quantity must be at least 1."; return; }
          var payload={
            product_id:pid, quantity:qty(),
            direction:MG.pickVal(body,"mgNtDir"),
            transfer_date:MG.v(body,"mgNtDate")||MG.today()
          };
          var notes=MG.v(body,"mgNtNotes").trim(); if(notes) payload.notes=notes;
          var btn=body.querySelector("#mgNtSave"); btn.disabled=true;
          MG.api("transfers.create",payload).then(function(){
            close(); MG.toast("Stock moved","ok");
            self.fetch(); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; err.textContent=e2.message; });
        });
      }
    });
  }
};

    var body=rows.map(function(r){
      var c=MG.chById(r.channel);
      var gross=(+r.revenue_idr||0)-(+r.cogs_idr||0);
      var m=(+r.revenue_idr||0)>0 ? (gross/(+r.revenue_idr)*100) : null;
