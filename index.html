        +'<td class="num">'+money(r.cogs_idr)+'</td>'
        +'<td class="num '+marginClass(m)+'">'+money(gross)+'</td>'
        +'<td class="num '+marginClass(m)+'">'+pct(m)+'</td></tr>';
    }).join("");
    var table='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th>Channel</th><th>Orders</th><th>Units</th><th>Revenue</th><th>COGS</th><th>Gross</th><th>Margin</th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>';

    el("mgChBody").innerHTML=totals+stack+'<div style="height:10px;"></div>'+cards+'<div style="height:14px;"></div>'+table;
  }
};

/* ===================== IMPORT WIZARD (Shopee xlsx) ===================== */
MG.imp = {
  st:{ built:false, orders:null, ordersName:"", income:null, incomeName:"", items:null, summary:null,
       q:"", actionFilter:"", sortKey:"", sortDir:1, fromLocation:"warehouse" },

  /* SheetJS is lazy-loaded only when the Import tab is used. */
  _libP:null,
  lib:function(){
    if(window.XLSX) return Promise.resolve(window.XLSX);
    if(this._libP) return this._libP;
    var self=this;
    this._libP=new Promise(function(resolve, reject){
      var s=document.createElement("script");
      s.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";
      s.onload=function(){ resolve(window.XLSX); };
      s.onerror=function(){ self._libP=null; reject(new Error("Could not load the xlsx parser — check your connection.")); };
      document.head.appendChild(s);
    });
    return this._libP;
  },

  readBook:function(file){
    var self=this;
    return this.lib().then(function(XLSX){
      return new Promise(function(resolve, reject){
        var fr=new FileReader();
        fr.onload=function(){
          try{ resolve(XLSX.read(new Uint8Array(fr.result),{type:"array"})); }
          catch(e){ reject(new Error("Could not parse "+file.name+" — is it an xlsx export?")); }
        };
        fr.onerror=function(){ reject(new Error("Could not read "+file.name)); };
        fr.readAsArrayBuffer(file);
      });
    });
  },

  render:function(){
    var sec=el("sec-mg-import"), self=this;
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Import — Shopee orders</div>'
       +'<div class="note"><b>How it works:</b> export the orders xlsx from Shopee Seller Centre (Pesanan Saya) — '
         +'optionally also the income xlsx (Penghasilan Saya) for exact payouts — drop them below, review the plan, then commit. '
         +'Cancelled, already-imported and manually-entered sales are detected: nothing is ever double-counted.</div>'
       +'<div class="card">'
         +'<div class="mg-grid2">'
           +'<div class="fld"><label>1 · Orders xlsx (required)</label>'
             +'<div class="mg-drop" id="mgImpDropO">📄 Drop or click to choose<br><span style="font-size:11.5px;">ekspor Pesanan Saya</span></div></div>'
           +'<div class="fld"><label>2 · Income xlsx (optional)</label>'
             +'<div class="mg-drop" id="mgImpDropI">💰 Drop or click to choose<br><span style="font-size:11.5px;">ekspor Penghasilan Saya — exact payouts</span></div></div>'
         +'</div>'
         +'<div class="mg-foot" style="justify-content:flex-start;">'
           +'<button class="mg-btn primary" id="mgImpPrev" type="button" disabled>🔎 Preview import</button>'
           +'<span class="mg-count" id="mgImpHint" style="margin:0;"></span>'
         +'</div>'
       +'</div>'
       +'<div id="mgImpStage"></div>';
      this.st.built=true;
      this.wireDrop("mgImpDropO",".xlsx,.xls",function(f){ self.onOrders(f); });
      this.wireDrop("mgImpDropI",".xlsx,.xls",function(f){ self.onIncome(f); });
      el("mgImpPrev").addEventListener("click",function(){ self.preview(); });
    }
  },

  wireDrop:function(id, accept, onFile){
    var zone=el(id);
    var input=document.createElement("input");
    input.type="file"; input.accept=accept; input.style.display="none";
    zone.parentNode.appendChild(input);
    zone.addEventListener("click",function(){ input.click(); });
    input.addEventListener("change",function(){ if(input.files && input.files[0]) onFile(input.files[0]); input.value=""; });
    zone.addEventListener("dragover",function(e){ e.preventDefault(); zone.classList.add("on"); });
    zone.addEventListener("dragleave",function(){ zone.classList.remove("on"); });
    zone.addEventListener("drop",function(e){
      e.preventDefault(); zone.classList.remove("on");
      if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]);
    });
  },

  onOrders:function(file){
    var self=this, zone=el("mgImpDropO");
    zone.textContent="Reading "+file.name+"…";
    this.readBook(file).then(function(wb){
      var XLSX=window.XLSX;
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{raw:false,defval:null});
      if(!rows.length || !("No. Pesanan" in rows[0])){
        throw new Error("No \u201cNo. Pesanan\u201d column — this does not look like a Shopee orders export.");
      }
      self.st.orders=rows; self.st.ordersName=file.name;
      zone.classList.add("loaded");
      zone.innerHTML="✓ "+esc(file.name)+"<br><span style='font-size:11.5px;'>"+num(rows.length)+" rows</span>";
      el("mgImpPrev").disabled=false;
      el("mgImpHint").textContent=self.st.income?"":"Tip: add the income xlsx for exact payouts.";
    }).catch(function(err){
      zone.classList.remove("loaded");
      zone.innerHTML="📄 Drop or click to choose<br><span style='font-size:11.5px;color:var(--red);'>"+esc(err.message)+"</span>";
    });
  },

  onIncome:function(file){
    var self=this, zone=el("mgImpDropI");
    zone.textContent="Reading "+file.name+"…";
    this.readBook(file).then(function(wb){
      var XLSX=window.XLSX;
      var ws=wb.Sheets[wb.SheetNames[0]];
      var grid=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:null});
      var headIdx=-1, snCol=-1, payCol=-1;
      var snRe=/no\.?\s*pesanan/i;
      var payRe=/(total\s*penghasilan|penghasilan\s*bersih|total\s*pencairan|dana\s*pencairan)/i;
      for(var i=0;i<Math.min(grid.length,30);i++){
        var row=grid[i]||[];
        for(var j=0;j<row.length;j++){
          if(row[j] && snRe.test(String(row[j]))){ headIdx=i; snCol=j; break; }
        }
        if(headIdx>=0){
          for(var k=0;k<row.length;k++){
            if(row[k] && payRe.test(String(row[k]))){ payCol=k; break; }
          }
          break;
        }
      }
      if(headIdx<0 || payCol<0) throw new Error("Could not find order/payout columns — is this the income export?");
      var out=[];
      for(var r=headIdx+1;r<grid.length;r++){
        var line=grid[r]||[];
        var sn=line[snCol], pay=line[payCol];
        if(!sn) continue;
        out.push({ order_sn:String(sn).trim(), payout_idr:MG.parseMoney(pay) });
      }
      self.st.income=out; self.st.incomeName=file.name;
      zone.classList.add("loaded");
      zone.innerHTML="✓ "+esc(file.name)+"<br><span style='font-size:11.5px;'>"+num(out.length)+" payouts</span>";
      el("mgImpHint").textContent="";
    }).catch(function(err){
      zone.classList.remove("loaded");
      zone.innerHTML="💰 Drop or click to choose<br><span style='font-size:11.5px;color:var(--red);'>"+esc(err.message)+"</span>";
    });
  },

  preview:function(){
    var self=this, st=this.st;
    if(!st.orders) return;
    var btn=el("mgImpPrev"); if(btn){ btn.disabled=true; btn.textContent="Analyzing…"; }
    el("mgImpStage").innerHTML='<div class="card">'+MG.skel(6)+'</div>';
    var body={ channel:"shopee", orders:st.orders, from_location:st.fromLocation||"warehouse" };
    if(st.income && st.income.length) body.income=st.income;
    Promise.all([MG.loadCatalog(), MG.api("import.preview",body)]).then(function(res){
      var d=res[1]||{};
      st.summary=d.summary||{};
      st.items=arr(d.items).map(function(it){
        var includable = it.action==="insert" || it.action==="link_existing";
        var pid=it.mapped_product_id||null, saveAlias=false;
        // No saved alias? Pre-select the best fuzzy guess so the row isn't a blank
        // dropdown, and flag it to remember the mapping on commit — so the same
        // listing name never blocks again. Only auto-include confident guesses;
        // weaker ones are pre-filled but left unchecked for you to confirm.
        if(!pid){
          var sugg=arr(it.suggestions);
          if(sugg.length){
            pid=sugg[0].product_id;
            saveAlias=true;
            if((+sugg[0].score||0)>=0.6) includable=true;
          }
        }
        return {
          raw:it, include:includable,
          product_id:pid,
          payout:(+it.payout_idr||0),
          saveAlias:saveAlias
        };
      });
      if(btn){ btn.disabled=false; btn.textContent="🔎 Preview import"; }
      self.paintPreview();
    }).catch(function(err){
      if(btn){ btn.disabled=false; btn.textContent="🔎 Preview import"; }
      el("mgImpStage").innerHTML='<div class="card"><div class="empty">Preview failed — '+esc(err.message)+'</div></div>';
    });
  },

  actChip:function(action){
    var map={ insert:["insert","insert"], link_existing:["link","link"], skip_imported:["skip","already imported"],
      skip_cancelled:["skip","cancelled"], skip_unpaid:["skip","unpaid — skipped"], blocked:["blocked","blocked"] };
    var m=map[action]||["skip",action];
    return '<span class="mg-act '+m[0]+'">'+esc(m[1])+'</span>';
  },

  canToggle:function(d){
    var a=d.raw.action;
    return a==="insert" || a==="link_existing" || (a==="blocked" && d.product_id);
  },

  // filtered+sorted view over st.items; each entry keeps its absolute index.
  view:function(){
    var st=this.st, self=this;
    var q=(st.q||"").toLowerCase().trim(), af=st.actionFilter||"";
    var v=st.items.map(function(d,i){ return {d:d,i:i}; }).filter(function(x){
      var it=x.d.raw;
      if(af==="actionable" && !self.canToggle(x.d) && it.action!=="blocked") return false;
      else if(af && af!=="actionable" && it.action!==af) return false;
      if(!q) return true;
      var hay=(it.order_sn+" "+it.product_name+" "+(it.customer_name||"")+" "+it.sale_date+" "+it.action).toLowerCase();
      return hay.indexOf(q)>=0;
    });
    var k=st.sortKey, dir=st.sortDir===-1?-1:1;
    if(k){
      v.sort(function(a,b){
        var ia=a.d.raw, ib=b.d.raw, va, vb;
        if(k==="qty"){ va=+ia.qty; vb=+ib.qty; }
        else if(k==="payout"){ va=+a.d.payout||0; vb=+b.d.payout||0; }
        else if(k==="order"){ va=ia.order_sn; vb=ib.order_sn; }
        else if(k==="product"){ va=ia.product_name; vb=ib.product_name; }
        else if(k==="buyer"){ va=ia.customer_name||""; vb=ib.customer_name||""; }
        else if(k==="action"){ va=ia.action; vb=ib.action; }
        else { va=ia.sale_date; vb=ib.sale_date; }
        if(va<vb) return -1*dir; if(va>vb) return 1*dir; return a.i-b.i;
      });
    }
    return v;
  },

  paintPreview:function(){
    var self=this, st=this.st, s=st.summary||{};
    function chip(key,label,val,cls){
      var on=st.actionFilter===key?' style="border-color:var(--acc);"':'';
      return '<div class="ttotal mg-impchip" data-af="'+key+'"'+on+' title="Click to filter"><div class="t">'+label+'</div><div class="v num '+(cls||"")+'">'+val+'</div></div>';
    }
    var chips='<div class="ttotals" style="cursor:pointer;">'
      +chip("","Rows",num(s.total||st.items.length),"")
      +chip("insert","New sales",num(s.insert||0),"pos")
      +chip("link_existing","Link existing",num(s.link_existing||0),"")
      +chip("skip_imported","Already imported",num(s.skip_imported||0),"")
      +chip("skip_unpaid","Unpaid (skipped)",num(s.skip_unpaid||0),"")
      +chip("skip_cancelled","Cancelled",num(s.skip_cancelled||0),"")
      +chip("blocked","Blocked",num(s.blocked||0),(s.blocked||0)>0?"neg":"")
    +'</div>';

    var view=this.view();
    var eligible=view.filter(function(x){ return self.canToggle(x.d); });
    var allOn = eligible.length>0 && eligible.every(function(x){ return x.d.include; });

    function th(key,label){
      var arrow = st.sortKey===key ? (st.sortDir===-1?" ↓":" ↑") : "";
      return '<th class="mg-sorth" data-sort="'+key+'" style="cursor:pointer;white-space:nowrap;" title="Sort">'+label+arrow+'</th>';
    }

    var rows=view.map(function(x){
      var d=x.d, i=x.i, it=d.raw;
      var canToggle = self.canToggle(d);
      var mapCell;
      if(it.mapped_product_id){
        mapCell='🎴 '+esc(MG.prodLabelById(it.mapped_product_id));
      } else {
        var sugg=arr(it.suggestions);
        mapCell='<select class="dd mg-mapsel" data-map="'+i+'"><option value="">— map product —</option>'
          +sugg.map(function(g){
            return '<option value="'+g.product_id+'"'+(String(d.product_id)===String(g.product_id)?' selected':'')+'>★ '+esc(g.label)+' ('+Math.round((g.score||0)*100)+'%)</option>';
          }).join("")
          +MG.cat.products.filter(function(p){ return p.is_active!==false; }).map(function(p){
            var inSugg=false;
            for(var z=0;z<sugg.length;z++) if(String(sugg[z].product_id)===String(p.id)) inSugg=true;
            if(inSugg) return "";
            return '<option value="'+p.id+'"'+(String(d.product_id)===String(p.id)?' selected':'')+'>'+esc(MG.prodLabel(p))+'</option>';
          }).join("")
        +'</select>';
      }
      var html='<tr'+(arr(it.warnings).length?' style="border-bottom:none;"':'')+(canToggle?' class="mg-imp-row" data-row="'+i+'" style="cursor:pointer;"':'')+'>'
        +'<td onclick="event.stopPropagation()">'
          +(canToggle
            ? '<input type="checkbox" class="mg-cb" data-inc="'+i+'"'+(d.include?' checked':'')+'>'
            : '<span style="color:var(--muted);opacity:.5;" title="Nothing to do — this row is '+esc(it.action.split("_").join(" "))+'">–</span>')
        +'</td>'
        +'<td style="text-align:left;"><code style="font-size:11px;">'+esc(it.order_sn)+'</code></td>'
        +'<td style="text-align:left;max-width:240px;overflow:hidden;text-overflow:ellipsis;" title="'+esc(it.product_name)+'">'+esc(it.product_name)+'</td>'
        +'<td style="text-align:left;">'+mapCell+'</td>'
        +'<td class="num">'+num(it.qty)+'</td>'
        +'<td>'+esc(it.sale_date)+'</td>'
        +'<td style="text-align:left;">'+esc(it.customer_name||"—")+'</td>'
        +'<td><input class="inp mg-payout num" data-pay="'+i+'" value="'+(d.payout||0)+'"></td>'
        +'<td style="text-align:left;"><span class="mg-chip">'+esc({order:"order subtotal",income:"income ✓","shopee_net":"net (Shopee fees)"}[it.payout_source]||it.payout_source||"—")+'</span></td>'
        +'<td style="text-align:left;">'+self.actChip(it.action)
          +(it.match_sale_id?(' <span style="font-size:11px;color:var(--muted);">#'+it.match_sale_id+'</span>'):'')+'</td>'
      +'</tr>';
      if(arr(it.warnings).length){
        html+='<tr class="mg-imp-row-x"><td></td><td colspan="9" style="text-align:left;">'
          +'<div class="mg-warnline">⚠ '+it.warnings.map(esc).join(" · ")+'</div></td></tr>';
      }
      return html;
    }).join("");

    el("mgImpStage").innerHTML='<div class="card">'
      +'<div class="sec-title" style="margin-top:0;">Review plan <span style="font-weight:400;color:var(--muted);font-size:12px;">— click a summary chip to filter, headers to sort</span></div>'
      +chips
      +'<div id="mgImpBar" style="position:sticky;top:6px;z-index:25;">'
        +'<div class="mg-bulk" style="margin:10px 0;">'
          +'<button class="mg-btn primary" id="mgImpGo" type="button"></button>'
          +'<span class="mg-count" id="mgImpSelInfo" style="margin:0;"></span>'
          +'<span class="spacer" style="flex:1;"></span>'
          +'<span class="bn" style="color:var(--muted);font-weight:600;">Deduct from:</span>'
          +'<button class="mg-btn sm'+(st.fromLocation!=="store"?" primary":"")+'" id="mgImpLocWh" type="button">🏠 Warehouse</button>'
          +'<button class="mg-btn sm'+(st.fromLocation==="store"?" primary":"")+'" id="mgImpLocSt" type="button">🏬 Store</button>'
          +'<input class="inp" id="mgImpQ" type="search" autocomplete="off" placeholder="🔍 order, product, buyer…" value="'+esc(st.q||"")+'" style="max-width:200px;min-height:32px;font-size:13px;">'
          +'<button class="mg-btn sm" id="mgImpSelAll" type="button">'+(allOn?"Unselect":"Select")+' all eligible ('+num(eligible.length)+')</button>'
          +(st.actionFilter?'<button class="mg-btn sm" id="mgImpClearF" type="button">✕ Clear filter</button>':'')
        +'</div>'
      +'</div>'
      +'<div class="mg-count">'+num(view.length)+' of '+num(st.items.length)+' rows shown · disabled checkboxes = nothing to do (already imported / cancelled / unpaid)</div>'
      +'<div class="tscroll"><table class="mg"><thead><tr>'
        +'<th><input type="checkbox" class="mg-cb" id="mgImpSelHdr"'+(allOn?' checked':'')+(eligible.length?'':' disabled')+' title="Select all eligible shown"></th>'
        +th("order","Order")+th("product","Shopee product")+'<th>Maps to</th>'+th("qty","Qty")+th("date","Date")+th("buyer","Buyer")+th("payout","Payout")+'<th>Src</th>'+th("action","Action")
      +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
      +'<div class="mg-count" style="margin-top:8px;">Inserts consume FIFO stock; links just tag the existing sale.</div>'
      +'<div id="mgImpResults"></div>'
    +'</div>';

    var stage=el("mgImpStage");
    Array.prototype.forEach.call(stage.querySelectorAll("[data-inc]"),function(c){
      c.addEventListener("change",function(){
        st.items[+c.getAttribute("data-inc")].include=c.checked;
        self.syncGo();
      });
    });
    Array.prototype.forEach.call(stage.querySelectorAll("tr.mg-imp-row"),function(r){
      r.addEventListener("click",function(e){
        if(e.target && (e.target.tagName==="SELECT"||e.target.tagName==="INPUT"||e.target.tagName==="OPTION")) return;
        var d=st.items[+r.getAttribute("data-row")];
        d.include=!d.include;
        var cb=r.querySelector("[data-inc]"); if(cb) cb.checked=d.include;
        self.syncGo();
      });
    });
    Array.prototype.forEach.call(stage.querySelectorAll("[data-map]"),function(sel){
      sel.addEventListener("change",function(){
        var d=st.items[+sel.getAttribute("data-map")];
        d.product_id=sel.value?+sel.value:null;
        d.saveAlias=!!sel.value;
        d.include=!!sel.value && d.raw.action!=="skip_imported" && d.raw.action!=="skip_cancelled";
        self.paintPreview();
      });
    });
    Array.prototype.forEach.call(stage.querySelectorAll("[data-pay]"),function(inp){
      inp.addEventListener("input",function(){
        st.items[+inp.getAttribute("data-pay")].payout=MG.parseMoney(inp.value);
        self.syncGo();
      });
    });
    Array.prototype.forEach.call(stage.querySelectorAll(".mg-impchip"),function(c){
      c.addEventListener("click",function(){
        var af=c.getAttribute("data-af");
        st.actionFilter = (st.actionFilter===af) ? "" : af;
        self.paintPreview();
      });
    });
    Array.prototype.forEach.call(stage.querySelectorAll(".mg-sorth"),function(h){
      h.addEventListener("click",function(){
        var k=h.getAttribute("data-sort");
        if(st.sortKey===k) st.sortDir=(st.sortDir===-1)?1:-1;
        else { st.sortKey=k; st.sortDir=1; }
        self.paintPreview();
      });
    });
    var qIn=el("mgImpQ");
    qIn.addEventListener("input",function(){
      st.q=qIn.value;
      clearTimeout(self._qt);
      self._qt=setTimeout(function(){
        var pos=qIn.selectionStart;
        self.paintPreview();
        var n=el("mgImpQ"); if(n){ n.focus(); try{ n.setSelectionRange(pos,pos); }catch(e){} }
      },250);
    });
    function setAll(on){
      self.view().forEach(function(x){ if(self.canToggle(x.d)) x.d.include=on; });
      self.paintPreview();
    }
    function setLoc(loc){ if(st.fromLocation===loc) return; st.fromLocation=loc; self.preview(); }
    var lw=el("mgImpLocWh"); if(lw) lw.addEventListener("click",function(){ setLoc("warehouse"); });
    var lst=el("mgImpLocSt"); if(lst) lst.addEventListener("click",function(){ setLoc("store"); });
    el("mgImpSelAll").addEventListener("click",function(){ setAll(!allOn); });
    var hdr=el("mgImpSelHdr"); if(hdr) hdr.addEventListener("change",function(){ setAll(hdr.checked); });
    var cf=el("mgImpClearF"); if(cf) cf.addEventListener("click",function(){ st.actionFilter=""; self.paintPreview(); });
    el("mgImpGo").addEventListener("click",function(){ self.commit(); });
    this.syncGo();
  },

  selected:function(){
    return (this.st.items||[]).filter(function(d){
      if(!d.include || !d.product_id) return false;
      var a=d.raw.action;
      return a==="insert" || a==="link_existing" || a==="blocked";
    });
  },

  syncGo:function(){
    var picked=this.selected();
    var n=picked.length, tot=0;
    picked.forEach(function(d){ tot+=(+d.payout||0); });
    var btn=el("mgImpGo"); if(!btn) return;
    btn.textContent="📥 Commit "+num(n)+" sale"+(n===1?"":"s");
    btn.disabled=!n;
    var info=el("mgImpSelInfo");
    if(info) info.textContent = n ? (num(n)+" selected · "+money(tot)) : "nothing selected";
  },

  commit:function(){
    var self=this, st=this.st;
    var picked=this.selected();
    if(!picked.length) return;
    var items=picked.map(function(d){
      var it=d.raw;
      var isLink = it.action==="link_existing" && it.match_sale_id;
      var out={
        mode:isLink?"link":"insert",
        order_sn:it.order_sn,
        product_id:d.product_id,
        qty:it.qty,
        sale_date:it.sale_date,
        customer_name:it.customer_name||null,
        total_idr:d.payout||0
      };
      if(isLink) out.sale_id=it.match_sale_id;
      else out.from_location=st.fromLocation||"warehouse";
      if(d.saveAlias) out.save_alias=it.product_name;
      return out;
    });
    var btn=el("mgImpGo"); btn.disabled=true; btn.textContent="Committing…";
    MG.api("import.commit",{ channel:"shopee", items:items }).then(function(d){
      var results=arr((d||{}).results);
      var ins=0, lnk=0, dup=0, errs=0;
      var lines=results.map(function(r){
        var icon, cls="";
        if(r.status==="inserted"){ ins++; icon="✓"; cls="pos"; }
        else if(r.status==="linked"){ lnk++; icon="🔗"; cls="pos"; }
        else if(r.status==="skipped_duplicate"){ dup++; icon="↷"; cls=""; }
        else { errs++; icon="✗"; cls="neg"; }
        return '<div class="sline"><span class="'+cls+'">'+icon+' <code style="font-size:11px;">'+esc(r.order_sn)+'</code> '
          +esc(r.status)+(r.sale_id?(" → sale #"+r.sale_id):"")+'</span>'
          +(r.error?'<span class="mg-warnline">'+esc(r.error)+'</span>':'')+'</div>';
      }).join("");
      el("mgImpResults").innerHTML='<div class="mg-stage" style="margin-top:14px;">'
        +'<div style="font-weight:700;margin-bottom:6px;">Done — '+num(ins)+' inserted · '+num(lnk)+' linked · '
        +num(dup)+' duplicates skipped'+(errs?' · <span class="neg">'+num(errs)+' failed</span>':'')+'</div>'
        +lines+'</div>';
      btn.textContent="📥 Committed";
      if((ins+lnk)>0 && !errs){ MG.toast("Import complete 🎉","ok"); self.confetti(); }
      else if(errs){ MG.toast(num(errs)+" rows failed — see details","err"); btn.disabled=false; btn.textContent="📥 Retry failed"; }
      else MG.toast("Nothing new — all rows were already in.","ok");
      MG.loadCatalog(true);
    }).catch(function(err){
      btn.disabled=false; self.syncGo();
      MG.fail(err);
    });
  },

  confetti:function(){
    var colors=["#4c9aff","#8b5cf6","#34d399","#fbbf24","#fb7185"];
    for(var i=0;i<46;i++){
      var d=document.createElement("div");
      d.className="mg-confetti";
      d.style.left=(Math.random()*100)+"vw";
      d.style.background=colors[i%colors.length];
      d.style.animationDuration=(2+Math.random()*1.6)+"s";
      d.style.animationDelay=(Math.random()*0.5)+"s";
      document.body.appendChild(d);
      (function(n){ setTimeout(function(){ if(n.parentNode) n.parentNode.removeChild(n); },4200); })(d);
    }
  }
};

/* ===================== COMMAND PALETTE (Ctrl/Cmd+K) ===================== */
MG.palette = {
  _node:null, _idx:0, _matches:[],

  init:function(){
    var self=this;
    document.addEventListener("keydown",function(e){
      if((e.metaKey||e.ctrlKey) && String(e.key).toLowerCase()==="k"){
        e.preventDefault(); self.toggle();
      }
    });
  },

  commands:function(){
    var out=[];
    TABS.forEach(function(t){
      out.push({ icon:t[2], label:"Go to "+t[1], kind:"tab", run:function(){ setTab(t[0]); } });
    });
    function act(icon,label,fn){ out.push({ icon:icon, label:label, kind:"action", run:fn }); }
    act("🛍️","New sale",function(){ setTab("mg-sales"); MG.loadCatalog().then(function(){ MG.sales.addModal(); }).catch(MG.fail); });
    act("🎴","New product",function(){ setTab("mg-products"); MG.loadCatalog().then(function(){ MG.products.editModal(null); }).catch(MG.fail); });
    act("🧾","New invoice",function(){ setTab("mg-invoices"); MG.loadCatalog().then(function(){ MG.invoices.addModal(); }).catch(MG.fail); });
    act("🚚","New shipment",function(){ setTab("mg-ship"); MG.loadCatalog().then(function(){ MG.ship.addModal(); }).catch(MG.fail); });
    act("🚛","New shipping leg",function(){ setTab("mg-legs"); MG.loadCatalog().then(function(){ MG.legs.addModal(); }).catch(MG.fail); });
    act("💸","New expense",function(){ setTab("mg-expenses"); MG.loadCatalog().then(function(){ MG.expenses.editModal(null); }).catch(MG.fail); });
    act("🔁","New transfer",function(){ setTab("mg-transfers"); MG.loadCatalog().then(function(){ MG.transfers.addModal(); }).catch(MG.fail); });
    act("👤","New party",function(){ setTab("mg-parties"); MG.loadCatalog().then(function(){ MG.parties.editModal(null); }).catch(MG.fail); });
    act("📥","Import Shopee orders",function(){ setTab("mg-import"); });
    act("⏻","Sign out",function(){ signOut(); });
    return out;
  },

  toggle:function(){ if(this._node) this.close(); else this.open(); },

  open:function(){
    var self=this;
    if(this._node) return;
    var wrap=document.createElement("div");
    wrap.className="mg-palette";
    wrap.innerHTML='<div class="mg-pal-card">'
      +'<input type="text" id="mgPalQ" placeholder="Type a command or page…" autocomplete="off" spellcheck="false">'
      +'<div class="mg-pal-list" id="mgPalList"></div>'
      +'<div class="mg-pal-hint"><span>↑↓ navigate</span><span>↵ run</span><span>esc close</span></div>'
    +'</div>';
    document.body.appendChild(wrap);
    this._node=wrap;
    this._idx=0;
    var input=wrap.querySelector("#mgPalQ");
    wrap.addEventListener("mousedown",function(e){ if(e.target===wrap) self.close(); });
    input.addEventListener("input",function(){ self._idx=0; self.paint(input.value); });
    input.addEventListener("keydown",function(e){
      if(e.key==="ArrowDown"){ e.preventDefault(); self._idx=Math.min(self._matches.length-1,self._idx+1); self.paint(input.value); }
      else if(e.key==="ArrowUp"){ e.preventDefault(); self._idx=Math.max(0,self._idx-1); self.paint(input.value); }
      else if(e.key==="Enter"){ e.preventDefault(); self.run(self._matches[self._idx]); }
      else if(e.key==="Escape"){ e.preventDefault(); e.stopPropagation(); self.close(); }
    });
    this.paint("");
    setTimeout(function(){ input.focus(); },0);
  },

  close:function(){
    if(this._node && this._node.parentNode) this._node.parentNode.removeChild(this._node);
    this._node=null;
  },

  paint:function(q){
    var self=this;
    q=(q||"").toLowerCase().trim();
    var toks=q?q.split(/\s+/):[];
    this._matches=this.commands().filter(function(c){
      var hay=c.label.toLowerCase();
      for(var i=0;i<toks.length;i++) if(hay.indexOf(toks[i])<0) return false;
      return true;
    });
    if(this._idx>=this._matches.length) this._idx=Math.max(0,this._matches.length-1);
    var list=this._node.querySelector("#mgPalList");
    if(!this._matches.length){
      list.innerHTML='<div class="mg-pal-item" style="cursor:default;color:var(--muted);">No matching commands.</div>';
      return;
    }
    list.innerHTML=this._matches.map(function(c,i){
      var label=esc(c.label);
      if(q){
        var pos=c.label.toLowerCase().indexOf(q);
        if(pos>=0){
          label=esc(c.label.slice(0,pos))+"<b>"+esc(c.label.slice(pos,pos+q.length))+"</b>"+esc(c.label.slice(pos+q.length));
        }
      }
      return '<div class="mg-pal-item'+(i===self._idx?' sel':'')+'" data-i="'+i+'">'
        +'<span class="pi">'+c.icon+'</span><span class="pl">'+label+'</span>'
        +'<span class="pk">'+esc(c.kind)+'</span></div>';
    }).join("");
    Array.prototype.forEach.call(list.querySelectorAll(".mg-pal-item[data-i]"),function(n){
      n.addEventListener("mousedown",function(e){ e.preventDefault(); self.run(self._matches[+n.getAttribute("data-i")]); });
    });
    var selNode=list.querySelector(".mg-pal-item.sel");
    if(selNode && selNode.scrollIntoView) selNode.scrollIntoView({block:"nearest"});
  },

  run:function(cmd){
    if(!cmd) return;
    this.close();
    try{ cmd.run(); }catch(e){ MG.fail(e); }
  }
};


var D = {};
(function(){
  var DATA_URL="https://klmiperlzdcsybgvudfd.supabase.co/functions/v1/dashboard?action=data";

  function showLogin(){ var l=el("login"); if(l) l.style.display="flex"; var g=el("gate"); if(g) g.style.display="none"; }
  function showGate(){ var l=el("login"); if(l) l.style.display="none"; var g=el("gate"); if(g) g.style.display="flex"; }

  function fetchData(token){
    // Resolves with parsed JSON, or rejects with Error("UNAUTHORIZED") / generic.
    return fetch(DATA_URL, { headers: { Authorization: "Basic " + token } })
      .then(function(r){
        if(r.status===401||r.status===403){ var e=new Error("UNAUTHORIZED"); e.code=401; throw e; }
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      });
  }

  function launch(json){ D = json||{}; var l=el("login"); if(l) l.style.display="none"; boot(); }

  function wireLogin(){
    var form=el("loginForm"), errEl=el("loginErr"), btn=el("loginBtn");
    if(!form) return;
    form.addEventListener("submit",function(ev){
      ev.preventDefault();
      var u=(el("loginUser")&&el("loginUser").value||"").trim();
      var p=(el("loginPass")&&el("loginPass").value)||"";
      if(errEl) errEl.textContent="";
      if(!u || !p){ if(errEl) errEl.textContent="Enter a username and password."; return; }
      var token = btoa(u + ":" + p);
      if(btn){ btn.disabled=true; btn.textContent="Signing in…"; }
      fetchData(token)
        .then(function(json){
          try{ localStorage.setItem("pokehit_auth", token); }catch(e){}
          launch(json);
        })
        .catch(function(err){
          if(btn){ btn.disabled=false; btn.textContent="Sign in"; }
          if(err && err.code===401){
            if(errEl) errEl.textContent="Invalid username or password.";
          } else {
            if(errEl) errEl.textContent="Couldn't reach server. Try again.";
          }
        });
    });
  }

  wireLogin();

  // Try a saved token first.
  var saved="";
  try{ saved=(localStorage.getItem("pokehit_auth")||"").trim(); }catch(e){}

  if(saved){
    showGate();
    fetchData(saved)
      .then(function(json){ launch(json); })
      .catch(function(err){
        if(err && err.code===401){
          try{ localStorage.removeItem("pokehit_auth"); }catch(e){}
          showLogin();
        } else {
          // Network/server error with a saved token: fall back to the login screen
          // so the user can retry, with a hint.
          var errEl=el("loginErr"); if(errEl) errEl.textContent="Couldn't reach server. Try again.";
          showLogin();
        }
      });
  } else {
    showLogin();
  }
})();

</script>
