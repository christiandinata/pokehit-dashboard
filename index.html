     +'<div style="border-top:1px dashed var(--border);margin-top:6px;padding-top:8px;font-size:13px;color:var(--muted);">'
     +'Cash + Inventory − Debt = <b class="'+((bal.equity||0)>=0?'pos':'neg')+'">'+money(bal.equity)+'</b> equity</div>'

/* ===================== EXPENSES ===================== */
// Distinct color per allocation bucket. Matches design brief.
var ALLOC_COLORS = {
  "Inventory (supplier payments)":"var(--acc)",
  "Shipping, legs & FX fees":"var(--acc-2)",
  "Operating expenses":"var(--amber)",
  "Capital returned to partners":"var(--green)",

function allocColor(bucket){ return ALLOC_COLORS[bucket] || "var(--muted)"; }

var exLedgerState = { cat:"all", q:"" };

function renderExpenses(){
  var sec=el("sec-expenses");
  var cf = cashflow || {};
  var totalIn = +cf.totalIn||0, totalOut = +cf.totalOut||0, net = +cf.net||0;

  /* ---- (A) WHERE DID THE MONEY GO? ---- */
  var allocSorted = allocation.slice().filter(function(a){ return Math.abs(+a.amount||0)>0; })
    .sort(function(a,b){ return (Math.abs(+b.amount||0))-(Math.abs(+a.amount||0)); });
  var allocTotal = 0; allocSorted.forEach(function(a){ allocTotal += Math.abs(+a.amount||0); });
  var baseOut = totalOut>0 ? totalOut : (allocTotal||1);

  var stack = allocSorted.map(function(a){
    var amt=Math.abs(+a.amount||0); var w=(amt/(allocTotal||1))*100;
    return '<div class="stackseg" style="width:'+w.toFixed(2)+'%;background:'+allocColor(a.bucket)+';" title="'+esc(a.bucket)+': '+esc(money(amt))+'"></div>';

  var allocRows = allocSorted.map(function(a){
    var amt=Math.abs(+a.amount||0);

      +'<span class="alloc-dot" style="background:'+allocColor(a.bucket)+';"></span>'
      +'<div class="alloc-main">'
        +'<div class="alloc-top"><span class="an">'+esc(a.bucket)+'</span><span class="av num">'+money(amt)+'</span></div>'
        +'<div class="alloc-track"><div class="alloc-fill" style="width:'+Math.max(2,wbar).toFixed(1)+'%;background:'+allocColor(a.bucket)+';"></div></div>'
      +'</div>'
      +'<span class="alloc-pct">'+pct(p)+'</span>'

  }).join("") || '<div class="empty">No outflow breakdown.</div>';

  var sectionA =
    '<div class="sec-title">Where did the money go?</div>'

     +'<div class="kpi-label" style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.7px;text-transform:uppercase;">Total money out</div>'
     +'<div class="ex-bigout num neg"><span class="cur">−</span>'+money(totalOut)+'</div>'
     +'<div class="ex-cap">Every Rupiah that left Pokehit, grouped by where it went.</div>'
     +'<div class="stackbar">'+stack+'</div>'
     +'<div class="alloc-list">'+allocRows+'</div>'
   +'</div>';

  /* ---- (B) HOW DO I HAVE Rp X CASH? — reconciliation ---- */
  var inSorted = inflows.slice().sort(function(a,b){ return (+b.amount||0)-(+a.amount||0); });
  var outSorted = outflows.slice().sort(function(a,b){ return (Math.abs(+b.amount||0))-(Math.abs(+a.amount||0)); });
  var inRows = inSorted.map(function(r){
    var c = r.count!=null ? ' <span style="color:var(--muted);font-weight:400;">('+num(r.count)+')</span>' : '';
    return '<div class="recon-r"><span class="rl">'+esc(r.category||"—")+c+'</span>'
      +'<span class="rr pos">'+money(Math.abs(+r.amount||0))+'</span></div>';
  }).join("") || '<div class="recon-r"><span class="rl">No inflows</span><span class="rr">—</span></div>';
  var outRows = outSorted.map(function(r){
    var c = r.count!=null ? ' <span style="color:var(--muted);font-weight:400;">('+num(r.count)+')</span>' : '';
    return '<div class="recon-r"><span class="rl"><span class="op">−</span>'+esc(r.category||"—")+c+'</span>'
      +'<span class="rr neg">'+money(Math.abs(+r.amount||0))+'</span></div>';
  }).join("") || '<div class="recon-r"><span class="rl">No outflows</span><span class="rr">—</span></div>';

  var cashBal = (bal && bal.cash!=null) ? +bal.cash : net;
  var matches = Math.abs(net - cashBal) < 1;
  var matchLine = matches
    ? '<div class="recon-match">✓ This matches your Cash balance.</div>'
    : '<div class="recon-mismatch">⚠ Computed net ('+money(net)+') differs from Cash balance ('+money(cashBal)+').</div>';

  var sectionB =
    '<div class="sec-title">How do I have '+money(cashBal)+' cash?</div>'
   +'<div class="card recon">'
     +'<div class="recon-h"><span>Money in</span><span></span></div>'
     +inRows
     +'<div class="recon-sub"><span>Total in</span><span class="rr pos">'+money(totalIn)+'</span></div>'
     +'<div class="recon-h"><span>Money out</span><span></span></div>'
     +outRows
     +'<div class="recon-sub"><span>Total out</span><span class="rr neg">−'+money(totalOut)+'</span></div>'
     +'<div class="recon-net"><span class="nl">Net cash</span><span class="nv '+(net>=0?'pos':'neg')+'">'+money(net)+'</span></div>'
     +matchLine
   +'</div>';

  /* ---- (C) OPERATING EXPENSES detail ---- */
  var opSorted = arr(opex).slice().filter(function(o){ return Math.abs(+o.amount||0)>0; })
    .sort(function(a,b){ return (Math.abs(+b.amount||0))-(Math.abs(+a.amount||0)); });
  var opMax = 1; opSorted.forEach(function(o){ opMax=Math.max(opMax,Math.abs(+o.amount||0)); });
  var opHtml = opSorted.map(function(o){
    var amt=Math.abs(+o.amount||0);
    var w=(amt/opMax)*100;
    var cat=o.category||"";
    var txRows = rows.filter(function(r){ return (r.category||"")===cat; });
    var txBody = txRows.map(function(r){
      return '<tr><td>'+esc(r.date||"—")+'</td>'
        +'<td>'+esc(r.counterparty||"—")+'</td>'
        +'<td class="num">'+money(Math.abs(+r.amount||0))+'</td>'
        +'<td>'+esc(r.desc||"—")+'</td></tr>';
    }).join("");
    var tx = txRows.length
      ? '<div class="tscroll"><table class="compact"><thead><tr><th>Date</th><th>Counterparty</th><th>Amount</th><th>Description</th></tr></thead><tbody>'+txBody+'</tbody></table></div>'
      : '<div class="empty">No matching transactions.</div>';
    return '<div class="opx" data-opx="1">'

        +'<span class="opx-amt num">'+money(amt)+'</span></div>'
      +'<div class="opx-track"><div class="opx-fill" style="width:'+Math.max(2,w).toFixed(1)+'%;"></div></div>'
      +'<div class="opx-tx">'+tx+'</div>'
    +'</div>';
  }).join("") || '<div class="empty">No operating expenses.</div>';

  var sectionC =
    '<div class="sec-title">Operating expenses — tap to see transactions</div>'
   +'<div class="card">'+opHtml+'</div>';

  /* ---- (D) FULL OUTFLOW LEDGER ---- */
  var cats={};
  rows.forEach(function(r){ if(r.category) cats[r.category]=true; });
  var catOpts='<option value="all">All categories</option>'+Object.keys(cats).sort().map(function(c){
    return '<option value="'+esc(c)+'">'+esc(c)+'</option>';
  }).join("");

  var sectionD =
    '<div class="sec-title">Full outflow ledger</div>'
   +'<div class="card">'
     +'<div class="ledger-filter">'
       +'<div class="ctl-row"><span class="ctl-lbl">Category</span>'
         +'<select class="dd" id="exLedgerCat">'+catOpts+'</select></div>'
       +'<div class="ctl-row grow"><span class="ctl-lbl">Search</span>'
         +'<input class="inp" id="exLedgerSearch" type="search" inputmode="search" autocomplete="off" placeholder="counterparty, description…"></div>'
     +'</div>'
     +'<div class="ledger-count" id="exLedgerCount"></div>'
     +'<div id="exLedgerTable"></div>'
   +'</div>';

  sec.innerHTML = sectionA + sectionB + sectionC + sectionD;

  // wire (C) expand
  Array.prototype.forEach.call(sec.querySelectorAll(".opx"),function(o){
    o.addEventListener("click",function(){ o.classList.toggle("open"); });
  });

  // wire (D) filter + search
  var catSel=el("exLedgerCat"), srch=el("exLedgerSearch");
  if(catSel){ catSel.value=exLedgerState.cat; catSel.addEventListener("change",function(e){ exLedgerState.cat=e.target.value; refreshExLedger(); }); }
  if(srch){ srch.value=exLedgerState.q; srch.addEventListener("input",function(e){ exLedgerState.q=e.target.value; refreshExLedger(); }); }
  refreshExLedger();
}
function refreshExLedger(){
  var tbl=el("exLedgerTable"); if(!tbl) return;
  var cf = cashflow || {};
  // Global search box should also filter the ledger.
  var globalQ="";
  var gs=el("searchD")||el("searchM"); if(gs) globalQ=(gs.value||"").trim().toLowerCase();
  var localQ=(exLedgerState.q||"").trim().toLowerCase();
  var rows=arr(cf.outflowRows).slice();
  // newest first
  rows.sort(function(a,b){ return (a.date<b.date?1:a.date>b.date?-1:0); });
  rows=rows.filter(function(r){
    if(exLedgerState.cat!=="all" && (r.category||"")!==exLedgerState.cat) return false;
    function hit(q){
      if(!q) return true;
      var hay=((r.category||"")+" "+(r.counterparty||"")+" "+(r.desc||"")+" "+(r.date||"")).toLowerCase();
      return hay.indexOf(q)>=0;
    }
    return hit(localQ) && hit(globalQ);
  });
  var cnt=el("exLedgerCount");
  if(cnt) cnt.textContent = num(rows.length)+(rows.length===1?" transaction":" transactions");
  if(!rows.length){ tbl.innerHTML='<div class="empty">No transactions match.</div>'; return; }
  var body=rows.map(function(r){
    return '<tr><td>'+esc(r.date||"—")+'</td>'
      +'<td>'+esc(r.category||"—")+'</td>'
      +'<td>'+esc(r.counterparty||"—")+'</td>'
      +'<td class="num neg">'+money(Math.abs(+r.amount||0))+'</td>'
      +'<td>'+esc(r.desc||"—")+'</td></tr>';
  }).join("");
  tbl.innerHTML='<div class="tscroll"><table><thead><tr>'
    +'<th>Date</th><th>Category</th><th>Counterparty</th><th>Amount</th><th>Description</th>'
    +'</tr></thead><tbody>'+body+'</tbody></table></div>';
}

      var nm=b.label||("#"+(b.shipmentId||i));
      var tag=b.onOrder?' · on order (buy only)':(b.qtyRemaining!=null?(' · '+num(b.qtyRemaining)+' left'):'');
      return '<option value="'+i+'">'+esc(nm)+' · '+money(+b.landedPerUnit||0)+tag+'</option>';
    }).join("");
    sel.innerHTML=opts;
    sel.value=(sbState.batch==null?"":sbState.batch);
  }
  function updateBasis(){
    var p=sbProduct(), bs=sbBatches(p), landed=sbLanded(p);
    var picked=(sbState.batch!=="" && sbState.batch!=null && bs[+sbState.batch]);
    var extra='';
    if(picked){
      var b=bs[+sbState.batch];
      extra=' <span style="color:var(--muted);">(buy '+money(+b.buyPerUnit||0)+' + ship/fee '+money(+b.shipFeePerUnit||0)+')</span>';
    }
    el("sbBasis").innerHTML='Cost basis '+(picked?'(selected batch)':'(avg landed)')+': <b>'+money(landed)+'</b> / unit'+extra
      +(p.retailPrice?(' · retail '+money(p.retailPrice)):'')
      +(p.supplierPrice?(' · supplier '+money(p.supplierPrice)):'');
  }
  // init defaults from current product (also resets the basis to average)
  function loadDefaults(){
    var p=sbProduct();
    sbState.batch="";
    fillBatches();
    var landed=sbLanded(p);
    var defPrice=Math.round(+p.retailPrice || (landed*1.2) || 0);
    var defQty=Math.max(1, Math.round(+p.inWarehouse || 10));
    sbState.price=defPrice; sbState.qty=defQty;
    var priceMax=Math.max(defPrice*3, landed*3, 100000);
    var qtyMax=Math.max(defQty*4, 50);
    el("sbPriceN").value=defPrice; el("sbPriceR").max=priceMax; el("sbPriceR").value=defPrice;
    el("sbQtyN").value=defQty; el("sbQtyR").max=qtyMax; el("sbQtyR").value=defQty;
    updateBasis();
  }
  function recalc(){
    var p=sbProduct();
    var landed=sbLanded(p);
    var price=+sbState.price||0, qty=+sbState.qty||0;
    var revenue=price*qty, cogs=landed*qty, profit=revenue-cogs;
    var margin=revenue>0?(profit/revenue*100):0;
    el("sbPriceHint").textContent="= "+money(price)+" each";
    el("sbQtyHint").textContent=num(qty)+" units";
    el("sbOut").innerHTML=
      '<div class="sb-cell"><div class="k">Revenue</div><div class="v num">'+money(revenue)+'</div></div>'
     +'<div class="sb-cell"><div class="k">COGS</div><div class="v num">'+money(cogs)+'</div></div>'
     +'<div class="sb-cell"><div class="k">Profit</div><div class="v num '+(profit>=0?"pos":"neg")+'">'+money(profit)+'</div></div>'
     +'<div class="sb-cell"><div class="k">Margin</div><div class="v num '+marginClass(margin)+'">'+pct(margin)+'</div></div>';
    var cmp="";
    if(p.retailPrice){
      var rm=p.retailPrice>0?((p.retailPrice-landed)/p.retailPrice*100):0;
      var diff=price-p.retailPrice;
      cmp+='At your retail price ('+money(p.retailPrice)+') margin would be <b class="'+marginClass(rm)+'">'+pct(rm)+'</b>. '
         +'You are '+(diff>=0?'<b class="pos">'+money(diff)+' above</b>':'<b class="neg">'+money(-diff)+' below</b>')+' retail.';
    }
    if(p.supplierPrice){
      cmp+=(cmp?'<br>':'')+'Supplier price is '+money(p.supplierPrice)+' / unit.';
    }
    if(!cmp) cmp='No retail/supplier price on record to compare against.';
    el("sbCmp").innerHTML=cmp;
  }
  function recalcTarget(){
    var p=sbProduct();
    var landed=sbLanded(p);
    var m=Math.max(0,Math.min(94,+sbState.targetMargin||0));
    var reqPrice = m>=100 ? 0 : landed/(1-m/100);
    var profit=reqPrice-landed;
    el("sbTgtOut").innerHTML=
      '<div class="sb-cell"><div class="k">Required price / unit</div><div class="v num">'+money(reqPrice)+'</div></div>'
     +'<div class="sb-cell"><div class="k">Profit / unit</div><div class="v num pos">'+money(profit)+'</div></div>';
  }
  function recalcAll(){ recalc(); recalcTarget(); }

  loadDefaults();
  // target default
  el("sbTgtN").value=sbState.targetMargin; el("sbTgtR").value=sbState.targetMargin;
  recalcAll();

  // searchable product combo
  function sbRenderMenu(filter){
    var q=(filter||"").toLowerCase().trim();
    var list=products.filter(function(p){ return !q || prodName(p).toLowerCase().indexOf(q)>=0; });
    var menu=el("sbProdMenu");
    if(!list.length){ menu.innerHTML='<div class="sb-mi empty">No match</div>'; return; }
    menu.innerHTML=list.map(function(p){
      var on=String(p.productId)===String(sbProduct()&&sbProduct().productId);
      return '<div class="sb-mi'+(on?' on':'')+'" data-pid="'+esc(p.productId)+'">'+esc(prodName(p))+'</div>';
    }).join("");
    Array.prototype.forEach.call(menu.querySelectorAll("[data-pid]"),function(it){
      it.addEventListener("mousedown",function(ev){ ev.preventDefault(); sbPick(it.getAttribute("data-pid")); });
    });
  }
  function sbPick(pid){
    sbState.product=pid;
    el("sbProdSearch").value=prodName(sbProduct());
    el("sbProdMenu").style.display="none";
    loadDefaults(); recalcAll();
  }
  el("sbProdSearch").value=prodName(sbProduct());
  el("sbProdSearch").addEventListener("focus",function(){ this.select(); sbRenderMenu(""); el("sbProdMenu").style.display="block"; });
  el("sbProdSearch").addEventListener("input",function(){ sbRenderMenu(this.value); el("sbProdMenu").style.display="block"; });
  el("sbProdSearch").addEventListener("blur",function(){
    var inp=this; setTimeout(function(){ var m=el("sbProdMenu"); if(m) m.style.display="none"; if(inp) inp.value=prodName(sbProduct()); },150);
  });
  el("sbBatch").addEventListener("change",function(e){ sbState.batch=e.target.value; updateBasis(); recalcAll(); });
  el("sbPriceN").addEventListener("input",function(e){ sbState.price=+e.target.value||0; el("sbPriceR").value=sbState.price; recalc(); });
  el("sbPriceR").addEventListener("input",function(e){ sbState.price=+e.target.value||0; el("sbPriceN").value=sbState.price; recalc(); });
  el("sbQtyN").addEventListener("input",function(e){ sbState.qty=+e.target.value||0; el("sbQtyR").value=sbState.qty; recalc(); });
  el("sbQtyR").addEventListener("input",function(e){ sbState.qty=+e.target.value||0; el("sbQtyN").value=sbState.qty; recalc(); });
  el("sbTgtN").addEventListener("input",function(e){ sbState.targetMargin=+e.target.value||0; el("sbTgtR").value=sbState.targetMargin; recalcTarget(); });
  el("sbTgtR").addEventListener("input",function(e){ sbState.targetMargin=+e.target.value||0; el("sbTgtN").value=sbState.targetMargin; recalcTarget(); });
}

var menuState={ tab:"ready" };
function idnDate(){
  var M=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus",
         "September","Oktober","November","Desember"];
  var d=new Date(); return d.getDate()+" "+M[d.getMonth()]+" "+d.getFullYear();
}
// integer with "." thousands separators — built by hand (no regex; template
// literals eat backslashes, see prettyTs gotcha).
function menuDots(n){
  var s=String(Math.round(n)), out="", c=0;
  for(var i=s.length-1;i>=0;i--){ out=s.charAt(i)+out; if(++c%3===0 && i>0) out="."+out; }
  return out;
}
function menuShortType(t){
  var s=(t||"").toLowerCase();
  if(s.indexOf("box case")>=0) return "Case";
  if(s.indexOf("bundle case")>=0) return "Bundle Case";
  if(s.indexOf("etb")>=0) return "ETB";
  if(s.indexOf("costco")>=0) return "Costco";
  if(s.indexOf("booster box")>=0) return "Box";
  if(s.indexOf("set")>=0) return "Set";
  if(s.indexOf("box")>=0) return "Box";
  return t||"";
}
function buildMenuText(readyOnly){
  function jp(p){ var l=(p.language||"").toLowerCase(); return l.charAt(0)==="j"?"🇯🇵":""; }
  function inc(p){
    if(!(+p.supplierPrice>0)) return false;
    if(readyOnly) return ((+p.inWarehouse||0)+(+p.inStore||0))>0;
    return true;
  }
  var list=arr(products).filter(inc);
  function isLoose(p){ return (p.type||"").toLowerCase().indexOf("loose")>=0; }
  function isBundle(p){ var s=(p.type||"").toLowerCase(); return s.indexOf("bundle")>=0 && s.indexOf("case")<0 && s.indexOf("loose")<0; }
  function sect(match, otherBox){
    return list.filter(match).slice().sort(function(a,b){ return String(a.setName).localeCompare(String(b.setName)); })
      .map(function(p){
        var label=otherBox ? (p.setName+" "+menuShortType(p.type)) : p.setName;
        return jp(p)+label+" : "+menuDots((+p.supplierPrice)/1000);
      });
  }
  var pack=sect(isLoose,false);
  var bun=sect(isBundle,false);
  var oth=sect(function(p){ return !isLoose(p) && !isBundle(p); }, true);

  var L=[];
  L.push("🔥 MENU SUPPLIER POKEMON TCG TANGERANG 🔥");
  L.push(idnDate()); L.push("");
  L.push(readyOnly?"*READY STOCK*":"*PRICE LIST (semua produk)*");
  if(pack.length){ L.push("*Pack*"); L=L.concat(pack); L.push(""); }
  if(bun.length){ L.push("*Bundle*"); L=L.concat(bun); L.push(""); }
  if(oth.length){ L.push("*Other BOX*"); L=L.concat(oth); L.push(""); }
  L.push("----------------------"); L.push("");
  L.push("*T&C:*");
  L.push("✅ Stock terbatas");
  L.push("✅ Harga dapat berubah sewaktu-waktu");
  L.push("✅ Booking hanya dianggap valid setelah pembayaran ");
  L.push("✅ Min Purchase 50 (Loose Pack)/ 2 (Box/ Bundle) ");
  L.push("✅ Butuh Menu Lain? Gas PO 🚀🚀🚀");
  L.push("✅ 100% Trusted, Barang gak ada? GARANSI FULL REFUND ");
  L.push("");
  L.push("Gas sebelum sold out!");
  return L.join(String.fromCharCode(10));
}

  el("stkTable").innerHTML='<div class="tscroll"><table><thead><tr>'
    +th("name","Product")+th("inWarehouse","🏠 Wh")+th("inStore","🏬 Store")+th("inTransit","🚚 Transit")+th("onOrder","⏳ Order")+th("totalStock","📦 Total")
    +'</tr></thead><tbody>'+body+'</tbody></table></div>';
  Array.prototype.forEach.call(el("stkTable").querySelectorAll(".stk-sort"),function(h){
    h.addEventListener("click",function(){
      var key=h.getAttribute("data-k");
      if(stockState.sortKey===key) stockState.sortDir=stockState.sortDir===-1?1:-1;
      else { stockState.sortKey=key; stockState.sortDir=key==="name"?1:-1; }
      paintStockBody();
    });
  });
}

function signOut(){

  location.reload();

function prettyTs(ts){
  // Postgres now()::text: "2026-06-11 06:40:50.92827+00" (UTC). Parsed by
  // hand with slice() — deliberately NO regexes: this JS lives inside a TS
  // template literal which eats backslash escapes (a literal d became d in
  // the shipped page once; never again).
  if(!ts) return {abs:"—", rel:""};
  var s=String(ts);
  function N(x){ return parseInt(x,10); }
  var y=N(s.slice(0,4)), mo=N(s.slice(5,7)), da=N(s.slice(8,10));
  var hh=N(s.slice(11,13)), mi=N(s.slice(14,16)), se=N(s.slice(17,19));
  if(!y||!mo||!da||isNaN(hh)||isNaN(mi)) return {abs:s.split(".")[0], rel:""};
  var offMin=0, rest=s.slice(19), pi=rest.indexOf("+"), ni=rest.indexOf("-");
  var p=(pi>=0)?pi:ni, sign=(pi>=0)?1:-1;
  if(p>=0){
    var oz=rest.slice(p+1).split(":").join("");
    offMin=sign*((N(oz.slice(0,2))||0)*60+(N(oz.slice(2,4))||0));
  }
  var d=new Date(Date.UTC(y,mo-1,da,hh,mi,isNaN(se)?0:se)-offMin*60000);
  var abs;
  try{
    abs=d.toLocaleString(undefined,{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false});
  }catch(e){ abs=d.toLocaleString(); }
  var diff=Math.max(0,(Date.now()-d.getTime())/1000), rel;
  if(diff<60) rel="just now";
  else if(diff<3600) rel=Math.round(diff/60)+" min ago";
  else if(diff<86400) rel=Math.round(diff/3600)+" hr ago";
  else rel=Math.round(diff/86400)+" day"+(diff<172800?"":"s")+" ago";
  return {abs:abs, rel:rel};
}

/* Searchable combo — options registry + one-time delegated events, so combos
   work inside any modal without per-callsite wiring. Value lives in the hidden
   input (same id the callers already read via MG.v). */
MG._combo = {};
MG._comboWired = false;
MG.wireCombos = function(){
  if(MG._comboWired) return; MG._comboWired=true;
  function wrapOf(t){ return t && t.closest ? t.closest(".mg-combo") : null; }
  function listOf(w){ return w.querySelector(".mg-combo-list"); }
  function openList(w, q){
    var id=w.getAttribute("data-combo"), opts=MG._combo[id]||[], list=listOf(w);
    var needle=(q||"").toLowerCase().trim();
    var hits=needle?opts.filter(function(o){ return o.l.toLowerCase().indexOf(needle)>=0; }):opts;
    list.innerHTML = hits.length
      ? hits.slice(0,80).map(function(o){ return '<div class="mg-combo-opt" data-v="'+esc(o.v)+'">'+esc(o.l)+'</div>'; }).join("")
        +(hits.length>80?'<div class="mg-combo-opt none">…'+num(hits.length-80)+' more — keep typing</div>':'')
      : '<div class="mg-combo-opt none">No match</div>';
    list.style.display="block";
  }
  function pick(w, v, l){
    w.querySelector("input[type=hidden]").value=v;
    w.querySelector("input[type=text]").value=l;
    listOf(w).style.display="none";
  }
  function closeAll(except){
    Array.prototype.forEach.call(document.querySelectorAll(".mg-combo-list"),function(n){
      if(!except || !except.contains(n)) n.style.display="none";
    });
  }
  document.addEventListener("focusin",function(e){
    var w=wrapOf(e.target);
    if(w && e.target.type==="text"){ closeAll(w); e.target.select(); openList(w, ""); }
  });
  document.addEventListener("input",function(e){
    var w=wrapOf(e.target);
    if(w && e.target.type==="text"){
      // typing invalidates the previous selection until a new pick is made
      w.querySelector("input[type=hidden]").value="";
      openList(w, e.target.value);
    }
  });
  document.addEventListener("keydown",function(e){
    if(e.key!=="Enter") return;
    var w=wrapOf(e.target);
    if(w && e.target.type==="text"){
      var first=listOf(w).querySelector(".mg-combo-opt:not(.none)");
      if(first){ e.preventDefault(); pick(w, first.getAttribute("data-v"), first.textContent); }
    }
  });
  document.addEventListener("click",function(e){
    var opt=e.target && e.target.closest ? e.target.closest(".mg-combo-opt:not(.none)") : null;
    if(opt){ var w=wrapOf(opt); pick(w, opt.getAttribute("data-v"), opt.textContent); return; }
    closeAll(wrapOf(e.target));
  });
};

/* ---------- searchable product picker ---------- */
MG.pickerHtml = function(id, ph){
  return '<div class="mg-pp" id="'+id+'">'
    +'<input class="inp" type="text" autocomplete="off" placeholder="'+esc(ph||"Search product…")+'" data-pid="">'
    +'<div class="mg-pp-list" style="display:none;"></div></div>';

MG.wirePicker = function(root, id, onPick){
  var box=root.querySelector("#"+id); if(!box) return;
  var input=box.querySelector("input"), list=box.querySelector(".mg-pp-list");
  var idx=-1, matches=[];
  function rows(q){
    q=(q||"").toLowerCase().trim();
    var toks=q?q.split(/\s+/):[];
    return MG.cat.products.filter(function(p){
      if(p.is_active===false) return false;
      var hay=MG.prodLabel(p).toLowerCase();
      for(var i=0;i<toks.length;i++) if(hay.indexOf(toks[i])<0) return false;
      return true;
    }).slice(0,40);
  }
  function paint(){
    if(!matches.length){ list.innerHTML='<div class="mg-pp-item" style="cursor:default;color:var(--muted);">No products match.</div>'; return; }
    list.innerHTML=matches.map(function(p,i){
      var st=MG.stockOf(p.id);
      return '<div class="mg-pp-item'+(i===idx?' sel':'')+'" data-i="'+i+'">'
        +'<span>🎴 '+esc(MG.prodLabel(p))+'</span>'
        +'<span class="st">🏠'+num(st.in_warehouse)+' 🏬'+num(st.in_store)
        +(p.sale_price_idr?' · 💵'+money(p.sale_price_idr):'')+'</span></div>';
    }).join("");
    Array.prototype.forEach.call(list.querySelectorAll(".mg-pp-item[data-i]"),function(n){
      n.addEventListener("mousedown",function(e){ e.preventDefault(); choose(+n.getAttribute("data-i")); });
    });
  }
  function open(){ matches=rows(input.value); idx=matches.length?0:-1; paint(); list.style.display="block"; }
  function closeList(){ list.style.display="none"; }
  function choose(i){
    var p=matches[i]; if(!p) return;
    input.value=MG.prodLabel(p);
    input.setAttribute("data-pid", String(p.id));
    closeList();
    if(onPick) onPick(p);
  }
  input.addEventListener("focus",open);
  input.addEventListener("input",function(){ input.setAttribute("data-pid",""); open(); });
  input.addEventListener("blur",function(){ setTimeout(closeList,150); });
  input.addEventListener("keydown",function(e){
    if(list.style.display==="none") return;
    if(e.key==="ArrowDown"){ e.preventDefault(); idx=Math.min(matches.length-1,idx+1); paint(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); idx=Math.max(0,idx-1); paint(); }
    else if(e.key==="Enter"){ e.preventDefault(); if(idx>=0) choose(idx); }
    else if(e.key==="Escape"){ closeList(); }
  });
};

  if(mfirst) mfirst.insertAdjacentHTML("beforebegin",'<div class="navgrp">Manage</div>');
  // Mobile segs: give manage tabs their icon so "Sales/Expenses" don't collide
  var MANAGE_TABS={"mg-sales":1,"mg-products":1,"mg-invoices":1,"mg-ship":1,"mg-legs":1,"mg-expenses":1,"mg-transfers":1,"mg-parties":1,"mg-import":1};
  Array.prototype.forEach.call(document.querySelectorAll(".mseg"),function(b){
    var t=b.getAttribute("data-tab");
    if(MANAGE_TABS[t]){
      for(var i=0;i<TABS.length;i++) if(TABS[i][0]===t){ b.textContent=TABS[i][2]+" "+TABS[i][1]; break; }
    }
  });
};

MG.onTab = function(name){
  if(name==="channels") MG.channels.render();
  else if(name==="mg-sales") MG.sales.render();
  else if(name==="mg-products") MG.products.render();
  else if(name==="mg-invoices") MG.invoices.render();
  else if(name==="mg-ship") MG.ship.render();
  else if(name==="mg-legs") MG.legs.render();
  else if(name==="mg-expenses") MG.expenses.render();
  else if(name==="mg-transfers") MG.transfers.render();
  else if(name==="mg-parties") MG.parties.render();
  else if(name==="mg-import") MG.imp.render();
};

/* ===================== MANAGE · SALES ===================== */
MG.sales = {
  st:{ rows:[], q:"", date_from:"", date_to:"", product_id:"", channel:"", sel:{}, built:false, loading:false, page:1, pageSize:100 },

  render:function(){
    var sec=el("sec-mg-sales");
    if(!this.st.built){
      sec.innerHTML=
        '<div class="sec-title">Sales — manage</div>'
       +'<div class="card">'
         +'<div class="mg-toolbar">'
           +'<div class="ctl-row"><span class="ctl-lbl">From</span><input class="inp" type="date" id="mgSaleFrom"></div>'
           +'<div class="ctl-row"><span class="ctl-lbl">To</span><input class="inp" type="date" id="mgSaleTo"></div>'
           +'<div class="ctl-row"><span class="ctl-lbl">Product</span><select class="dd" id="mgSaleProd"><option value="">All</option></select></div>'
           +'<div class="ctl-row"><span class="ctl-lbl">Channel</span><select class="dd" id="mgSaleCh"><option value="">All</option></select></div>'
           +'<div class="ctl-row grow"><span class="ctl-lbl">Search</span><input class="inp" type="search" id="mgSaleQ" placeholder="customer, product, order id…"></div>'
           +'<button class="mg-btn" id="mgSaleReload" type="button" title="Reload">↻</button>'
           +'<button class="mg-btn primary" id="mgSaleAdd" type="button">＋ New sale</button>'
         +'</div>'
         +'<div class="ttotals" id="mgSaleTotals" style="margin:2px 0 12px;"></div>'
         +'<div class="mg-count"><span id="mgSaleCount"></span>'
           +'<span style="margin-left:8px;color:var(--muted);font-weight:400;">· 🖱️ click a row to edit · ☑️ tick boxes to bulk-edit</span></div>'
         +'<div id="mgSaleBulk"></div>'
         +'<div id="mgSaleTable">'+MG.skel(6)+'</div>'
       +'</div>';
      this.st.built=true;
      var self=this;
      el("mgSaleFrom").addEventListener("change",function(e){ self.st.date_from=e.target.value; self.fetch(); });
      el("mgSaleTo").addEventListener("change",function(e){ self.st.date_to=e.target.value; self.fetch(); });
      el("mgSaleProd").addEventListener("change",function(e){ self.st.product_id=e.target.value; self.fetch(); });
      el("mgSaleCh").addEventListener("change",function(e){ self.st.channel=e.target.value; self.fetch(); });
      el("mgSaleQ").addEventListener("input",function(e){ self.st.q=e.target.value; self.st.page=1; self.paint(); });
      el("mgSaleReload").addEventListener("click",function(){ self.fetch(true); });
      el("mgSaleAdd").addEventListener("click",function(){ self.addModal(); });
      MG.loadCatalog().then(function(){
        el("mgSaleProd").innerHTML='<option value="">All products</option>'+MG.cat.products.map(function(p){
          return '<option value="'+p.id+'">'+esc(MG.prodLabel(p))+'</option>';
        }).join("");
        el("mgSaleCh").innerHTML='<option value="">All channels</option>'+MG.CHANNELS.map(function(c){
          return '<option value="'+c.id+'">'+c.icon+' '+esc(c.label)+'</option>';
        }).join("");
      });
    }
    this.fetch();
  },

  fetch:function(force){
    var self=this, st=this.st;
    if(st.loading && !force) return;
    st.loading=true;
    el("mgSaleTable").innerHTML=MG.skel(6);
    st.page=1;
    var body={ limit:100000 };   // load all matching; paginate client-side so search/filter span everything
    if(st.date_from) body.date_from=st.date_from;
    if(st.date_to) body.date_to=st.date_to;
    if(st.product_id) body.product_id=+st.product_id;
    if(st.channel) body.channel=st.channel;
    Promise.all([MG.loadCatalog(), MG.api("sales.list", body)]).then(function(res){
      st.rows=arr((res[1]||{}).sales);
      st.loading=false; st.sel={};
      self.paint();
    }).catch(function(err){
      st.loading=false;
      el("mgSaleTable").innerHTML='<div class="empty">Could not load sales — '+esc(err.message)+'</div>';
    });
  },

  filtered:function(){
    var q=(this.st.q||"").toLowerCase().trim();
    if(!q) return this.st.rows;
    return this.st.rows.filter(function(s){
      var hay=((s.product_name||"")+" "+(s.customer_name||"")+" "+(s.channel_order_id||"")+" "+(s.sale_date||"")+" "+(s.channel||"")).toLowerCase();
      return hay.indexOf(q)>=0;
    });
  },

  paint:function(){
    var self=this, st=this.st, all=this.filtered();
    var total=all.length, ps=st.pageSize||100, pages=Math.max(1, Math.ceil(total/ps));
    if(st.page>pages) st.page=pages; if(st.page<1) st.page=1;
    var start=(st.page-1)*ps, rows=all.slice(start, start+ps);
    // Totals over the WHOLE filtered set (all pages / date range), not just this page.
    var tRev=0, tCogs=0, tUnits=0;
    all.forEach(function(s){ tRev+=+s.total_idr||0; tCogs+=+s.cogs_total_idr||0; tUnits+=+s.quantity||0; });
    var tProfit=tRev-tCogs, tMargin=tRev>0?(tProfit/tRev*100):0;
    el("mgSaleTotals").innerHTML=
      '<div class="ttotal"><div class="t">Sales</div><div class="v num">'+num(total)+'</div></div>'
     +'<div class="ttotal"><div class="t">Units</div><div class="v num">'+num(tUnits)+'</div></div>'
     +'<div class="ttotal"><div class="t">Revenue</div><div class="v num">'+money(tRev)+'</div></div>'
     +'<div class="ttotal"><div class="t">COGS</div><div class="v num">'+money(tCogs)+'</div></div>'
     +'<div class="ttotal"><div class="t">Profit</div><div class="v num '+marginClass(tMargin)+'">'+money(tProfit)+'</div></div>'
     +'<div class="ttotal"><div class="t">Margin</div><div class="v num '+marginClass(tMargin)+'">'+pct(tMargin)+'</div></div>';
    el("mgSaleCount").textContent = total
      ? ("Showing "+num(start+1)+"–"+num(start+rows.length)+" of "+num(total)+(total!==st.rows.length?(" (of "+num(st.rows.length)+" total)"):"")+" sales")
      : ("0 of "+num(st.rows.length)+" sales");
    if(!total){
      el("mgSaleTable").innerHTML='<div class="empty">No sales match. Try widening the date range, or record one with ＋ New sale.</div>';
      this.paintBulk(); return;
    }
    function pagerHtml(){
      if(pages<=1) return "";
      function pg(n,label,on,dis){ return '<button data-pg="'+n+'"'+(on?' class="on"':'')+(dis?' disabled':'')+'>'+(label||n)+'</button>'; }
      var out=[pg(st.page-1,"‹",false,st.page<=1)], nums=[];
      if(pages<=9){ for(var i=1;i<=pages;i++) nums.push(i); }
      else { nums.push(1); var lo=Math.max(2,st.page-2), hi=Math.min(pages-1,st.page+2);
        if(lo>2) nums.push("…"); for(var j=lo;j<=hi;j++) nums.push(j); if(hi<pages-1) nums.push("…"); nums.push(pages); }
      nums.forEach(function(n){ out.push(n==="…"?'<span class="gap">…</span>':pg(n,String(n),n===st.page,false)); });
      out.push(pg(st.page+1,"›",false,st.page>=pages));
      return '<div class="mg-pager">'+out.join("")+'</div>';
    }
    var body=rows.map(function(s){
      var cogs=+s.cogs_total_idr||0, total=+s.total_idr||0, profit=total-cogs;
      var m=total>0?(profit/total*100):null;
      var loc=MG.locById(s.from_location);
      var checked=self.st.sel[s.id]?' checked':'';
      var name=s.product_name||MG.prodLabelById(s.product_id);
      return '<tr class="mg-click" data-id="'+s.id+'">'
        +'<td onclick="event.stopPropagation()"><input type="checkbox" class="mg-cb" data-sel="'+s.id+'"'+checked+'></td>'
        +'<td>'+esc(MG.dstr(s.sale_date))+'</td>'
        +'<td style="max-width:230px;overflow:hidden;text-overflow:ellipsis;">🎴 '+esc(name)+'</td>'
        +'<td class="num">'+num(s.quantity)+'</td>'
        +'<td class="num">'+money(s.unit_price_idr)+'</td>'
        +'<td class="num">'+money(total)+'</td>'
        +'<td style="text-align:left;">'+MG.chChip(s.channel)+'</td>'
        +'<td style="text-align:left;">'+esc(s.customer_name||"—")+'</td>'
        +'<td title="'+esc(loc.label)+'">'+loc.icon+'</td>'
        +'<td class="num '+marginClass(m)+'">'+money(profit)+'</td>'
        +'<td><span class="mg-rowact">'
          +'<button class="mg-iconbtn" data-edit="'+s.id+'" title="Edit">✏️</button>'
          +'<button class="mg-iconbtn" data-del="'+s.id+'" title="Delete">🗑️</button>'
        +'</span></td></tr>';
    }).join("");
    el("mgSaleTable").innerHTML='<div class="tscroll"><table class="mg"><thead><tr>'
      +'<th style="text-align:center;"><input type="checkbox" class="mg-cb" id="mgSaleSelAll" title="Select all on this page"></th>'
      +'<th>Date</th><th>Product</th><th>Qty</th><th>Unit</th><th>Total</th><th>Channel</th><th>Customer</th><th>Loc</th><th>Profit</th><th></th>'
      +'</tr></thead><tbody>'+body+'</tbody></table></div>'+pagerHtml();
    var t=el("mgSaleTable");
    Array.prototype.forEach.call(t.querySelectorAll("[data-pg]"),function(b){
      b.addEventListener("click",function(){
        var n=+b.getAttribute("data-pg");
        if(n>=1&&n<=pages){ st.page=n; self.paint(); if(t.scrollIntoView) t.scrollIntoView({block:"start",behavior:"smooth"}); }
      });
    });
    var selAll=el("mgSaleSelAll");
    if(selAll){
      selAll.checked = rows.length>0 && rows.every(function(s){ return self.st.sel[s.id]; });
      selAll.addEventListener("change",function(){
        if(selAll.checked){ rows.forEach(function(s){ self.st.sel[s.id]=true; }); }
        else { rows.forEach(function(s){ delete self.st.sel[s.id]; }); }
        self.paint();
      });
    }
    Array.prototype.forEach.call(t.querySelectorAll("[data-edit]"),function(b){
      b.addEventListener("click",function(e){ e.stopPropagation(); self.editModal(+b.getAttribute("data-edit")); });
    });
    Array.prototype.forEach.call(t.querySelectorAll("[data-del]"),function(b){
      b.addEventListener("click",function(e){ e.stopPropagation(); self.del(+b.getAttribute("data-del")); });
    });
    Array.prototype.forEach.call(t.querySelectorAll("[data-sel]"),function(c){
      c.addEventListener("change",function(){
        var id=+c.getAttribute("data-sel");
        if(c.checked) self.st.sel[id]=true; else delete self.st.sel[id];
        self.paintBulk();
      });
    });
    Array.prototype.forEach.call(t.querySelectorAll("tr.mg-click"),function(r){
      r.addEventListener("click",function(){ self.editModal(+r.getAttribute("data-id")); });
    });
    this.paintBulk();
  },

  paintBulk:function(){
    var self=this, ids=Object.keys(this.st.sel);
    var box=el("mgSaleBulk");
    if(!ids.length){ box.innerHTML=""; return; }
    box.innerHTML='<div class="mg-bulk"><span class="bn">'+num(ids.length)+' selected</span>'
      +'<span class="bn" style="margin-left:6px;font-weight:600;color:var(--muted);">Set channel:</span>'
      +MG.CHANNELS.map(function(c){
        return '<button class="mg-btn sm" data-cls="'+c.id+'">'+c.icon+' '+esc(c.label)+'</button>';
      }).join("")
      +'<span class="spacer" style="flex:1;"></span>'
      +'<button class="mg-btn sm" id="mgSaleBulkDel" style="color:var(--red);">🗑️ Delete</button>'
      +'<button class="mg-btn sm" id="mgSaleSelClear">Clear</button></div>';
    Array.prototype.forEach.call(box.querySelectorAll("[data-cls]"),function(b){
      b.addEventListener("click",function(){
        var ch=b.getAttribute("data-cls");
        MG.api("sales.classify",{ ids: ids.map(Number), channel: ch }).then(function(d){
          MG.toast("Tagged "+num((d&&d.updated)||ids.length)+" sales as "+MG.chById(ch).label,"ok");
          self.st.sel={}; self.fetch(true);
        }).catch(MG.fail);
      });
    });
    box.querySelector("#mgSaleBulkDel").addEventListener("click",function(){
      MG.confirmBox("Delete "+num(ids.length)+" sale"+(ids.length===1?"":"s")+"?",
        "Each one's stock is returned via FIFO reversal and it vanishes from every report. This cannot be undone.")
        .then(function(yes){
          if(!yes) return;
          Promise.all(ids.map(function(id){ return MG.api("sales.delete",{id:Number(id)}); }))
            .then(function(){ MG.toast("Deleted "+num(ids.length)+" sales","ok"); self.st.sel={}; self.fetch(true); MG.loadCatalog(true); })
            .catch(MG.fail);
        });
    });
    box.querySelector("#mgSaleSelClear").addEventListener("click",function(){ self.st.sel={}; self.paint(); });
  },

  /* ---- add sale ---- */
  addModal:function(){
    var self=this;
    var chans=MG.CHANNELS.map(function(c){ return {id:c.id,label:c.label,icon:c.icon,color:c.color}; });
    var locs=MG.LOCATIONS.map(function(l){ return {id:l.id,label:l.label,icon:l.icon}; });
    MG.modal({
      title:"＋ New sale", sub:"FIFO consumes oldest stock first — COGS locks in at sale time.",
      body:'<div class="mg-form">'
        +'<div class="fld"><label>Product</label>'+MG.pickerHtml("mgNsProd")+'</div>'
        +'<div class="mg-grid2">'
          +MG.f.num("mgNsQty","Quantity",1)
          +MG.f.date("mgNsDate","Sale date")
        +'</div>'
        +MG.f.picks("mgNsLoc","Sell from",locs,"warehouse")
        +'<div id="mgNsPlan" class="mg-plan" style="display:none;"></div>'
        +'<div class="mg-grid2">'
          +MG.f.num("mgNsPrice","Unit price (IDR)","",1000)
          +MG.f.num("mgNsTotal","Total (IDR)","",1000)
        +'</div>'
        +MG.f.text("mgNsCust","Customer","","optional")
        +MG.f.picks("mgNsCh","Channel",chans,"manual")
        +MG.f.text("mgNsNotes","Notes","","optional")
        +'<div class="mg-err" id="mgNsErr"></div>'
        +'<div class="mg-foot"><button class="mg-btn" id="mgNsCancel" type="button">Cancel</button>'
        +'<button class="mg-btn primary" id="mgNsSave" type="button">Record sale</button></div>'
      +'</div>',
      onMount:function(body, close){
        var lastEdited="price", planTimer=null;
        function qty(){ return Math.max(0, MG.parseMoney(MG.v(body,"mgNsQty"))); }
        function price(){ return MG.parseMoney(MG.v(body,"mgNsPrice")); }
        function total(){ return MG.parseMoney(MG.v(body,"mgNsTotal")); }
        // Bidirectional: type unit price → total = qty×price; type total →
        // unit price = total/qty. Changing quantity recomputes the derived side.
        function sync(){
          var q=qty();
          if(lastEdited==="total") body.querySelector("#mgNsPrice").value = (q>0 ? Math.round(total()/q) : "") || "";
          else body.querySelector("#mgNsTotal").value = (q>0 ? q*price() : "") || "";
        }
        function plan(){
          var pid=MG.pickerVal(body,"mgNsProd"), q=qty(), loc=MG.pickVal(body,"mgNsLoc");
          var pb=body.querySelector("#mgNsPlan");
          if(!pid||!q){ pb.style.display="none"; return; }
          pb.style.display="block"; pb.className="mg-plan";
          pb.innerHTML="Checking stock…";
          clearTimeout(planTimer);
          planTimer=setTimeout(function(){
            MG.api("sales.plan",{ product_id:pid, quantity:q, from_location:loc }).then(function(d){
              d=d||{};
              if(d.can){
                pb.className="mg-plan ok";
                pb.innerHTML='✓ '+num(q)+' available ('+num(d.available)+' in '+esc(MG.locById(loc).label.toLowerCase())+') · '
                  +'COGS <b>'+money(d.cogs_total_idr)+'</b> across '+num(arr(d.allocations).length)+' batch'+(arr(d.allocations).length===1?'':'es');
              } else {
                pb.className="mg-plan bad";
                pb.innerHTML='✗ Only <b>'+num(d.available)+'</b> available in '+esc(MG.locById(loc).label.toLowerCase())+' — reduce quantity or switch location.';
              }
            }).catch(function(err){ pb.className="mg-plan bad"; pb.textContent="Plan failed: "+err.message; });
          },250);
        }
        MG.wirePicker(body,"mgNsProd",function(p){
          if(p.sale_price_idr && !price()){ body.querySelector("#mgNsPrice").value=p.sale_price_idr; lastEdited="price"; sync(); }
          plan();
        });
        MG.wirePicks(body,"mgNsLoc",plan);
        MG.wirePicks(body,"mgNsCh");
        body.querySelector("#mgNsQty").addEventListener("input",function(){ sync(); plan(); });
        body.querySelector("#mgNsPrice").addEventListener("input",function(){ lastEdited="price"; sync(); });
        body.querySelector("#mgNsTotal").addEventListener("input",function(){ lastEdited="total"; sync(); });
        body.querySelector("#mgNsCancel").addEventListener("click",close);
        body.querySelector("#mgNsSave").addEventListener("click",function(){
          var err=body.querySelector("#mgNsErr"); err.textContent="";
          var pid=MG.pickerVal(body,"mgNsProd");
          if(!pid){ err.textContent="Pick a product."; return; }
          if(!qty()){ err.textContent="Quantity must be at least 1."; return; }
          var payload={
            product_id:pid, quantity:qty(),
            unit_price_idr:price(),
            from_location:MG.pickVal(body,"mgNsLoc"),
            sale_date:MG.v(body,"mgNsDate")||MG.today(),
            channel:MG.pickVal(body,"mgNsCh")||"manual"
          };
          var tot=total();
          if(tot) payload.total_idr=tot;
          var cust=MG.v(body,"mgNsCust").trim(); if(cust) payload.customer_name=cust;
          var notes=MG.v(body,"mgNsNotes").trim(); if(notes) payload.notes=notes;
          var btn=body.querySelector("#mgNsSave"); btn.disabled=true; btn.textContent="Saving…";
          MG.api("sales.create",payload).then(function(){
            close(); MG.toast("Sale recorded 🎉","ok");
            self.fetch(true); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; btn.textContent="Record sale"; err.textContent=e2.message; });
        });
      }
    });
  },

  /* ---- edit sale ---- */
  editModal:function(id){
    var self=this, s=null;
    for(var i=0;i<this.st.rows.length;i++) if(this.st.rows[i].id===id) s=this.st.rows[i];
    if(!s) return;
    var chans=MG.CHANNELS.map(function(c){ return {id:c.id,label:c.label,icon:c.icon,color:c.color}; });
    var name=s.product_name||MG.prodLabelById(s.product_id);
    MG.modal({
      title:"✏️ Sale #"+s.id,
      sub:"🎴 "+esc(name)+(s.channel_order_id?(' · order <code style="font-size:11px;">'+esc(s.channel_order_id)+'</code>'):''),
      body:'<div class="mg-form">'
        +'<div class="mg-grid2">'
          +MG.f.num("mgEsQty","Quantity",s.quantity)
          +MG.f.date("mgEsDate","Sale date",MG.dstr(s.sale_date))
        +'</div>'
        +'<div class="mg-grid2">'
          +MG.f.num("mgEsPrice","Unit price (IDR)",s.unit_price_idr,1000)
          +MG.f.num("mgEsTotal","Total (IDR)",s.total_idr,1000)
        +'</div>'
        +MG.f.text("mgEsCust","Customer",s.customer_name||"")
        +MG.f.picks("mgEsCh","Channel",chans,s.channel||"manual")
        +MG.f.text("mgEsNotes","Notes",s.notes||"")
        +'<div class="mg-err" id="mgEsErr"></div>'
        +'<div class="mg-foot">'
          +'<button class="mg-btn danger" id="mgEsDel" type="button">🗑 Delete</button>'
          +'<span class="grow"></span>'
          +'<button class="mg-btn" id="mgEsCancel" type="button">Cancel</button>'
          +'<button class="mg-btn primary" id="mgEsSave" type="button">Save changes</button>'
        +'</div>'
      +'</div>',
      onMount:function(body, close){
        MG.wirePicks(body,"mgEsCh");
        var lastEdited="price";
        function eq(){ return Math.max(0, MG.parseMoney(MG.v(body,"mgEsQty"))); }
        function ep(){ return MG.parseMoney(MG.v(body,"mgEsPrice")); }
        function et(){ return MG.parseMoney(MG.v(body,"mgEsTotal")); }
        // Bidirectional: type unit price → total = qty×price; type total →
        // unit price = total/qty. Quantity changes recompute the derived side.
        function sync(){
          var q=eq();
          if(lastEdited==="total") body.querySelector("#mgEsPrice").value = (q>0 ? Math.round(et()/q) : "") || "";
          else body.querySelector("#mgEsTotal").value = (q>0 ? q*ep() : "") || "";
        }
        body.querySelector("#mgEsQty").addEventListener("input",sync);
        body.querySelector("#mgEsPrice").addEventListener("input",function(){ lastEdited="price"; sync(); });
        body.querySelector("#mgEsTotal").addEventListener("input",function(){ lastEdited="total"; sync(); });
        body.querySelector("#mgEsCancel").addEventListener("click",close);
        body.querySelector("#mgEsDel").addEventListener("click",function(){ close(); self.del(s.id); });
        body.querySelector("#mgEsSave").addEventListener("click",function(){
          var err=body.querySelector("#mgEsErr"); err.textContent="";
          var updates=[];
          function diff(field, val, old){ if(String(val)!==String(old==null?"":old)) updates.push({field:field, value:val}); }
          var qv=MG.parseMoney(MG.v(body,"mgEsQty"));
          if(qv<1){ err.textContent="Quantity must be at least 1."; return; }
          diff("quantity", qv, s.quantity);
          diff("unit_price_idr", MG.parseMoney(MG.v(body,"mgEsPrice")), s.unit_price_idr);
          diff("total_idr", MG.parseMoney(MG.v(body,"mgEsTotal")), s.total_idr);
          diff("sale_date", MG.v(body,"mgEsDate"), MG.dstr(s.sale_date));
          diff("customer_name", MG.v(body,"mgEsCust").trim(), s.customer_name||"");
          diff("channel", MG.pickVal(body,"mgEsCh"), s.channel||"manual");
          diff("notes", MG.v(body,"mgEsNotes").trim(), s.notes||"");
          if(!updates.length){ close(); return; }
          var btn=body.querySelector("#mgEsSave"); btn.disabled=true; btn.textContent="Saving…";

          updates.forEach(function(u){
            p=p.then(function(){ return MG.api("sales.update",{ id:s.id, field:u.field, value:u.value }); });
          });
          p.then(function(){
            close(); MG.toast("Sale #"+s.id+" updated","ok");
            self.fetch(true); MG.loadCatalog(true);
          }).catch(function(e2){ btn.disabled=false; btn.textContent="Save changes"; err.textContent=e2.message; });
        });
      }
    });
  },

  del:function(id){

      .then(function(yes){

        MG.api("sales.delete",{id:id}).then(function(){
          MG.toast("Sale #"+id+" deleted","ok");
          self.fetch(true); MG.loadCatalog(true);
        }).catch(MG.fail);
      });
  }
};

  editModal:function(id){

      d=d||{};
      var inv=d.invoice||d, lines=arr(d.lines);
      var ccy=inv.currency||"IDR";

      var rate=1, i;
      for(i=0;i<lines.length;i++){ if(+lines[i].cost_per_unit>0 && +lines[i].cost_per_unit_idr>0){ rate=(+lines[i].cost_per_unit_idr)/(+lines[i].cost_per_unit); break; } }
      var work=lines.map(function(l){ return {id:l.id, product_id:l.product_id, qty:+l.quantity_ordered||0, cost:+l.cost_per_unit||0, del:false, isNew:false}; });

          sub:"👤 "+esc(inv.supplier_name||MG.partyName(inv.supplier_id))+" · "+esc(ccy)+(ccy!=="IDR"?(" · IDR = native × "+(Math.round(rate*100)/100)):""),
          body:'<div class="mg-form">'

            +'<div class="mg-err" id="mgIeErr"></div>'
            +'<div class="mg-foot"><button class="mg-btn" id="mgIeCancel" type="button">Cancel</button>'
            +'<button class="mg-btn primary" id="mgIeSave" type="button">Save changes</button></div>'
          +'</div>',
          onMount:function(body, close){
            function paintLines(){
              var b=body.querySelector("#mgIeBody");
              var html=work.map(function(w,idx){
                if(w.del) return '';
                return '<tr><td style="text-align:left;">🎴 '+esc(MG.prodLabelById(w.product_id))+(w.isNew?' <span style="color:var(--green);font-size:11px;">new</span>':'')+'</td>'

              Array.prototype.forEach.call(b.querySelectorAll("[data-c]"),function(inp){ inp.addEventListener("input",function(){ work[+inp.getAttribute("data-c")].cost=+inp.value||0; }); });
